let totalChapters=32;

let isEditMode=false,currentChapter=null,chapterData={};

function loadData(){
  const s=localStorage.getItem('skb7_data');if(s){try{chapterData=JSON.parse(s)}catch{chapterData={}}}
  updateStats()}
function saveData(){localStorage.setItem('skb7_data',JSON.stringify(chapterData));updateStats();showToast('已保存')}
let at;function autoSave(){clearTimeout(at);at=setTimeout(()=>{localStorage.setItem('skb7_data',JSON.stringify(chapterData));updateStats()},600)}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function updateStats(){
  let f=0,w=0;
  for(const d of Object.values(chapterData)){const t=[d.knowledge,d.competency,d.mistakes,d.kax,d.lessonPlan,d.homework].filter(Boolean).join('');if(t.length>10)f++;w+=t.length}
  document.getElementById('stats-filled').textContent=f;
  document.getElementById('stats-words').textContent=Math.round(w/1000);
  document.getElementById('progPct').textContent=Math.round(f/totalChapters*100)+'%';
  document.getElementById('progFill').style.width=Math.round(f/totalChapters*100)+'%';
}

// ====== 富文本编辑器函数 ======
function richCmd(cmd){
  document.execCommand(cmd, false, null);
  // 触发保存
  const ed=document.querySelector('.rich-edit:focus');
  if(ed) richAutoSave(ed);
}
function richInsertLink(editorId){
  const url=prompt('输入链接URL：', 'https://');
  if(!url)return;
  const txt=prompt('显示文字（留空则用URL）：', '') || url;
  const ed=document.getElementById(editorId);
  ed.focus();
  const sel=window.getSelection();
  if(sel.rangeCount){
    const range=sel.getRangeAt(0);
    const a=document.createElement('a');
    a.href=url; a.textContent=txt; a.target='_blank'; a.rel='noopener';
    range.deleteContents();
    range.insertNode(a);
    // 光标移到插入内容后
    const newRange=document.createRange();
    newRange.setStartAfter(a);
    newRange.collapse(true);
    sel.removeAllRanges();
    sel.addRange(newRange);
  }
  richAutoSave(ed);
}
function richUploadImg(chId, field, editorId){
  const input=document.createElement('input');
  input.type='file'; input.accept='image/*';
  input.onchange=function(){
    const f=this.files[0]; if(!f)return;
    if(f.size>3*1024*1024){showToast('图片不超过3MB');return}
    const r=new FileReader();
    r.onload=function(e){
      const img=new Image();
      img.onload=function(){
        const canvas=document.createElement('canvas');
        let w=img.width, h=img.height;
        const maxDim=1200;
        if(w>maxDim||h>maxDim){if(w>=h){h=Math.round(h*w/maxDim);w=maxDim}else{w=Math.round(w*h/maxDim);h=maxDim}}
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const dataUrl=canvas.toDataURL('image/jpeg',0.8);
        const ed=document.getElementById(editorId);
        ed.focus();
        const sel=window.getSelection();
        const imgEl=document.createElement('img');
        imgEl.src=dataUrl; imgEl.alt='上传的图片';
        if(sel.rangeCount){const range=sel.getRangeAt(0);range.deleteContents();range.insertNode(imgEl)}
        richAutoSave(ed);
        showToast('图片已插入');
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(f);
  };
  input.click();
}
function richUploadFile(chId, field, editorId){
  const input=document.createElement('input');
  input.type='file';
  input.onchange=function(){
    const f=this.files[0]; if(!f)return;
    if(f.size>5*1024*1024){showToast('文件不超过5MB');return}
    const r=new FileReader();
    r.onload=function(e){
      const d=chapterData[chId]; if(!d)return;
      if(!d[field+'_atts'])d[field+'_atts']=[];
      const attIdx=d[field+'_atts'].length;
      d[field+'_atts'].push({name:f.name,data:e.target.result,size:f.size});
      autoSave();
      // 在编辑器中插入文件badge
      const ed=document.getElementById(editorId);
      ed.focus();
      const sel=window.getSelection();
      const badge=document.createElement('span');
      badge.className='file-badge';
      badge.contentEditable='false';
      badge.dataset.attIdx=attIdx;
      badge.textContent='📎 '+f.name;
      if(sel.rangeCount){const range=sel.getRangeAt(0);range.deleteContents();range.insertNode(badge)}
      richAutoSave(ed);
      // 重新渲染以显示附件区
      if(currentChapter)renderContent(currentChapter);
      showToast('文件已上传：'+f.name);
    };
    r.readAsDataURL(f);
  };
  input.click();
}
function richPaste(event, editorId){
  const items=(event.clipboardData||event.originalEvent.clipboardData).items;
  for(let i=0;i<items.length;i++){
    if(items[i].type.indexOf('image')!==-1){
      event.preventDefault();
      const blob=items[i].getAsFile();
      const r=new FileReader();
      r.onload=function(e){
        const imgEl=document.createElement('img');
        imgEl.src=e.target.result; imgEl.alt='粘贴的图片';
        const ed=document.getElementById(editorId);
        ed.focus();
        const sel=window.getSelection();
        if(sel.rangeCount){const range=sel.getRangeAt(0);range.deleteContents();range.insertNode(imgEl)}
        richAutoSave(ed);
      };
      r.readAsDataURL(blob);
      return;
    }
  }
}
function richAutoSave(editor){
  const chId=editor.dataset.chid, field=editor.dataset.field;
  if(!chapterData[chId])chapterData[chId]={};
  chapterData[chId][field]=editor.innerHTML;
  renderNav();
  clearTimeout(editor._saveTimer);
  editor._saveTimer=setTimeout(()=>{localStorage.setItem('skb7_data',JSON.stringify(chapterData));updateStats()},600);
}
function richInsTag(tagEl, field, chId){
  const ed=document.getElementById('ed-'+field);
  if(!ed)return;
  const txt=tagEl.textContent;
  ed.focus();
  const sel=window.getSelection();
  if(sel.rangeCount){const range=sel.getRangeAt(0);range.deleteContents();range.insertNode(document.createTextNode(txt))}
  richAutoSave(ed);
}
function richDelAtt(chId, field, idx){
  if(!confirm('确定删除这个附件？'))return;
  if(chapterData[chId]&&chapterData[chId][field+'_atts']){
    chapterData[chId][field+'_atts'].splice(idx,1);
    autoSave();
    renderContent(currentChapter);
  }
}

function renderNav(){
  const nav=document.getElementById('chapterNav');nav.innerHTML='';
  for(const[grade,data]of Object.entries(textbook)){

function filterChapters(){const q=document.getElementById('searchBox').value.toLowerCase();document.querySelectorAll('.chapter-item').forEach(it=>{const n=(it.dataset.name||'').toLowerCase(),g=(it.dataset.grade||'').toLowerCase();it.style.display=(!q||n.includes(q)||g.includes(q))?'':'none'})}

function selectChapter(ch,item){
  currentChapter=ch;document.querySelectorAll('.chapter-item.active').forEach(el=>el.classList.remove('active'));item.classList.add('active');
  document.getElementById('currentTitle').textContent='第'+ch.num+'章 · '+ch.name;
  setGradeBg(getGrade(ch.id));
  if(!chapterData[ch.id])chapterData[ch.id]={knowledge:'',competency:'',mistakes:'',kax:'',lessonPlan:'',homework:'',images:[],knowledge_atts:[],competency_atts:[],mistakes_atts:[],kax_atts:[],lessonPlan_atts:[],homework_atts:[]};
  renderContent(ch);
}

function renderContent(ch){
  const d=chapterData[ch.id],main=document.getElementById('mainContent'),ed=isEditMode,grade=getGrade(ch.id),gc=gColors[grade];
  const secs=[
    {f:'knowledge',icon:'📖',title:'知识要点',tag:'核心',ph:'本章核心知识点、公式、定理、性质……'},
    {f:'competency',icon:'🎯',title:'核心素养与教学目标',tag:'课标',ph:'六大核心素养目标、教学重难点、教学方法……'},
    {f:'mistakes',icon:'⚠️',title:'易错清单',tag:'错因',ph:'学生常见错误类型、认知根源分析、干预策略……'},
    {f:'kax',icon:'📋',title:'KAX真题精选',tag:'真题',ph:'从KAX工具书中摘录典型真题，标注年份、地区、来源ID……'},
    {f:'lessonPlan',icon:'📝',title:'备课笔记',ph:'教案框架、课堂活动设计、提问链、板书设计、教学反思……'},
    {f:'homework',icon:'📄',title:'课后作业设计',ph:'分层作业：基础巩固层 / 能力提升层 / 拓展探究层……'}
  ];

  let html = '';

  // 章节信息栏
  html += '<div class="chapter-meta"><div class="meta-item">教材：<b>苏科版 · '+grade+'</b></div><div class="meta-item">第 '+ch.num+' 章 · '+ch.name+'</div></div>';

  // 各内容卡片
  secs.forEach(s=>{
    const v=d[s.f]||'';
    const atts=(d[s.f+'_atts']||[]);
    html+='<div class="section-card"><div class="card-hd" onclick="this.nextElementSibling.classList.toggle(\'collapsed\');this.querySelector(\'.hd-toggle\').classList.toggle(\'collapsed\')"><span class="hd-icon">'+s.icon+'</span><span class="hd-title">'+s.title+'</span>'+(s.tag?'<span class="hd-tag '+gc.tc+'">'+s.tag+'</span>':'')+'<span class="hd-toggle">▼</span></div><div class="card-bd">';
    if(ed){
      // 富文本工具栏
      const eid='ed-'+s.f;
      html+='<div class="rich-bar">';
      html+='<button onclick="document.execCommand(\'bold\')"><b>B</b></button>';
      html+='<button onclick="document.execCommand(\'italic\')"><i>I</i></button>';
      html+='<button onclick="document.execCommand(\'underline\')"><u>U</u></button>';
      html+='<span class="bar-sep"></span>';
      html+='<button onclick="richInsertLink(\''+eid+'\')">🔗 链接</button>';
      html+='<label><input type="file" accept="image/*" style="display:none" onchange="richUploadImgFromLabel(this,\''+ch.id+'\',\''+s.f+'\',\''+eid+'\')">🖼️ 图片</label>';
      html+='<label><input type="file" style="display:none" onchange="richUploadFileFromLabel(this,\''+ch.id+'\',\''+s.f+'\',\''+eid+'\')">📎 文件</label>';
      html+='<span class="bar-sep"></span>';
      html+='<button onclick="richInsertMath(\''+eid+'\')">∑ 公式</button>';
      html+='</div>';
      // 富文本编辑器
      html+='<div class="rich-edit" id="'+eid+'" data-chid="'+ch.id+'" data-field="'+s.f+'" oninput="richAutoSave(this)" onpaste="richPaste(event,\''+eid+'\')">'+v+'</div>';
      // 附件区
      if(atts.length>0){
        html+='<div class="att-zone"><div class="att-title">📎 附件（'+atts.length+'个）</div><div class="att-list">';
        atts.forEach((att,i)=>{
          const blob=new Blob([att.data],{type:'application/octet-stream'});
          const url=URL.createObjectURL(blob);
          html+='<div class="att-item">';
          html+='<span class="att-ic">📄</span>';
          html+='<span class="att-name">'+esc(att.name)+'</span>';
          html+='<a class="att-dl" href="'+att.data+'" download="'+esc(att.name)+'">下载</a>';
          html+='<span class="att-del" onclick="richDelAtt(\''+ch.id+'\',\''+s.f+'\','+i+')">删除</span>';
          html+='</div>';
        });
        html+='</div></div>';
      }
      if(s.st&&ch.keywords)html+='<div class="tag-row">'+ch.keywords.map(k=>'<span class="kw" onclick="richInsTag(this,\''+s.f+'\',\''+ch.id+'\')">'+k+'</span>').join('')+'</div>'
    } else {
      html+='<div class="rich-view">'+(v||'')+'</div>';
    }
    html+='</div></div>';
  });

  // 图片素材区
  const imgs=d.images||[];
  html+='<div class="section-card"><div class="card-hd" onclick="this.nextElementSibling.classList.toggle(\'collapsed\');this.querySelector(\'.hd-toggle\').classList.toggle(\'collapsed\')"><span class="hd-icon">🎼</span><span class="hd-title">图片素材</span><span class="hd-tag '+gc.tc+'">附件</span><span class="hd-toggle">▼</span></div><div class="card-bd">';
  if(ed)html+='<div class="upload-zone" onclick="this.querySelector(\'input\').click()"><div class="hint">点击上传图片（自动压缩存储）</div><input type="file" accept="image/*" onchange="uploadImg(\''+ch.id+'\',this)"></div>';
  if(imgs.length>0)html+='<div class="img-row">'+imgs.map(img=>'<img class="thumb" src="'+img+'" onclick="openLb(\''+img.replace(/'/g,"\\'")+'\')">').join('')+'</div>';
  html+='</div></div>';

  // 章节底部大图
  html += footerImgHtml(ch.id);

  if(ed){
    html+='<div class="section-card"><div class="card-hd" onclick="this.nextElementSibling.classList.toggle(\'collapsed\');this.querySelector(\'.hd-toggle\').classList.toggle(\'collapsed\')"><span class="hd-icon">∑</span><span class="hd-title">公式快速插入</span><span class="hd-tag '+gc.tc+'">LaTeX</span><span class="hd-toggle">▼</span></div><div class="card-bd"><div class="math-bar">'+
      mb('x²','$x^2$')+mb('√x','$\\sqrt{x}$')+mb('a/b','$\\frac{a}{b}$')+mb('±','$\\pm$')+
      mb('≠','$\neq$')+mb('≤','$\leq$')+mb('≥','$\geq$')+mb('△','$\triangle$')+
      mb('∠','$\angle$')+mb('∥','$\parallel$')+mb('⊥','$\perp$')+
      mb('π','$\pi$')+mb('°','$\circ$')+
      '<span class="bar-sep"></span>'+
      mb('y=kx+b','$y=kx+b$')+mb('二次函数','$y=ax^2+bx+c$')+mb('勾股','$a^2+b^2=c^2$')+
      mb('Δ','$\Delta=b^2-4ac$')+mb('求根','$x=\frac{-b\pm\sqrt{b^2-4ac}}{2a}$')+
      '</div><div style="font-size:11px;color:var(--text-dim);margin-top:6px">点击按钮插入到任意编辑区 · 支持 <code style="color:'+gc.acc+'">$公式$</code> 语法</div></div></div>'
  }

  main.innerHTML=html;
  if(!ed&&window.MathJax)setTimeout(()=>MathJax.typesetPromise([main]),100);
}

// richUploadImgFromLabel / richUploadFileFromLabel (for label-wrapped input)
function richUploadImgFromLabel(input, chId, field, editorId){
  const f=input.files[0]; if(!f)return;
  if(f.size>3*1024*1024){showToast('图片不超过3MB');return}
  const r=new FileReader();
  r.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      let w=img.width, h=img.height;
      const maxDim=1200;
      if(w>maxDim||h>maxDim){if(w>=h){h=Math.round(h*w/maxDim);w=maxDim}else{w=Math.round(w*h/maxDim);h=maxDim}}
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl=canvas.toDataURL('image/jpeg',0.8);
      const ed=document.getElementById(editorId);
      ed.focus();
      const sel=window.getSelection();
      const imgEl=document.createElement('img');
      imgEl.src=dataUrl; imgEl.alt='上传的图片';
      if(sel.rangeCount){const range=sel.getRangeAt(0);range.deleteContents();range.insertNode(imgEl)}
      richAutoSave(ed);
      showToast('图片已插入');
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(f);
  input.value='';
}
function richUploadFileFromLabel(input, chId, field, editorId){
  const f=input.files[0]; if(!f)return;
  if(f.size>5*1024*1024){showToast('文件不超过5MB');return}
  const r=new FileReader();
  r.onload=function(e){
    const d=chapterData[chId]; if(!d)return;
    if(!d[field+'_atts'])d[field+'_atts']=[];
    d[field+'_atts'].push({name:f.name,data:e.target.result,size:f.size});
    autoSave();
    const ed=document.getElementById(editorId);
    ed.focus();
    const sel=window.getSelection();
    const badge=document.createElement('span');
    badge.className='file-badge';badge.contentEditable='false';badge.dataset.attIdx=d[field+'_atts'].length-1;badge.textContent='📎 '+f.name;
    if(sel.rangeCount){const range=sel.getRangeAt(0);range.deleteContents();range.insertNode(badge)}
    richAutoSave(ed);
    if(currentChapter)renderContent(currentChapter);
    showToast('文件已上传：'+f.name);
  };
  r.readAsDataURL(f);
  input.value='';
}
function richInsertMath(editorId){
  const formula=prompt('输入LaTeX公式（无需$分隔符）：', 'x^2');
  if(!formula)return;
  const ed=document.getElementById(editorId);
  ed.focus();
  const sel=window.getSelection();
  const span=document.createElement('span');
  span.textContent='$'+formula+'$';
  if(sel.rangeCount){const range=sel.getRangeAt(0);range.deleteContents();range.insertNode(span)}
  richAutoSave(ed);
  if(window.MathJax)MathJax.typesetPromise([ed]);
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function mb(l,c){return'<button onclick="insLT(\''+(currentChapter?currentChapter.id:'')+'\',\''+(c||'')+'\')">'+l+'</button>'}

function autoSaveCh(id,f,v){if(!chapterData[id])chapterData[id]={};chapterData[id][f]=v;renderNav();autoSave()}
function insLT(id,code){const ed=document.querySelector('.rich-edit');if(!ed)return;const s=ed.selectionStart,e=ed.selectionEnd;ed.textContent=ed.textContent.substring(0,s)+code+ed.textContent.substring(e);ed.focus();richAutoSave(ed);if(window.MathJax)MathJax.typesetPromise([ed])}

function uploadImg(id,input){const f=input.files[0];if(!f)return;if(f.size>2*1024*1024){showToast('图片不超过2MB');return}const r=new FileReader();r.onload=function(e){if(!chapterData[id])chapterData[id]={};if(!chapterData[id].images)chapterData[id].images=[];chapterData[id].images.push(e.target.result);autoSave();renderContent(currentChapter);showToast('已上传')};r.readAsDataURL(f);input.value=''}

function openLb(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('show')}
