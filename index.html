<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初中数学 · 苏科版</title>
<script>MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']],displayMath:[['$$','$$'],['\\[','\\]']]},svg:{fontCache:'global'}};</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap');
:root{
  --ivory:#faf6ed;--ivory-dark:#f0e8d8;--card-bg:rgba(255,252,245,0.92);--card-bg2:rgba(253,249,240,0.94);
  --gold:#c9a227;--gold-light:#dfc47a;--gold-dark:#8b6914;--gold-glow:rgba(201,162,39,0.15);
  --gold-border:rgba(180,150,80,0.25);--text-pri:#4a3c2d;--text-sec:#7a6b58;--text-dim:#a09585;--text-head:#3d3020;
  --shadow-sm:0 2px 8px rgba(120,90,40,0.06);--shadow-md:0 4px 20px rgba(120,90,40,0.10);
  --radius:12px;--side-w:280px;
  /* 三色方案：七年级蓝、八年级绿、九年级紫 */
  --c7:#4a8fc2;--c7-bg:rgba(74,143,194,0.06);--c7-glow:rgba(74,143,194,0.08);
  --c8:#5cb85c;--c8-bg:rgba(92,184,92,0.05);--c8-glow:rgba(92,184,92,0.07);
  --c9:#9b6fc9;--c9-bg:rgba(155,111,201,0.06);--c9-glow:rgba(155,111,201,0.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Noto Serif SC","Microsoft YaHei","微软雅黑",serif;
  color:var(--text-pri);min-height:100vh;overflow-x:hidden;
  background:var(--ivory);position:relative;
}

/* ====== 背景图层 ====== */
.bg-layer{
  position:fixed;inset:0;z-index:-1;
  background-size:cover;background-position:center;background-repeat:no-repeat;
  opacity:0.12;filter:blur(2px);
  transition:background-image 1.5s ease;
}
.bg-layer::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 35%,rgba(250,246,237,0.4) 0%,rgba(250,246,237,0.78) 70%,rgba(250,246,237,0.95) 100%);
}

/* ====== 汉堡菜单 ====== */
.menu-btn{display:none;position:fixed;top:12px;left:12px;z-index:101;width:44px;height:44px;border:1px solid var(--gold-border);border-radius:10px;background:var(--card-bg);cursor:pointer;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
.menu-btn span{display:block;width:20px;height:2px;background:var(--gold-dark);position:relative;transition:.3s}
.menu-btn span::before,.menu-btn span::after{content:'';display:block;width:20px;height:2px;background:var(--gold-dark);position:absolute;transition:.3s}
.menu-btn span::before{top:-6px}.menu-btn span::after{top:6px}
.overlay-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;backdrop-filter:blur(3px)}
.overlay-mask.show{display:block}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--ivory-dark)}::-webkit-scrollbar-thumb{background:linear-gradient(var(--gold-light),var(--gold));border-radius:3px}

.app{display:flex;min-height:100vh}

/* ====== 页眉横幅 - v11 完整图片展示 ====== */
.header-banner{
  position:relative;width:100%;overflow:hidden;
  flex-shrink:0;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;padding:0 28px 20px;
  border-bottom:none;
  min-height:380px;
}
.header-banner .header-full-img{
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:cover;object-position:center top;
}
/* 渐变遮罩确保文字可读 */
.header-banner::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;z-index:1;
  background:linear-gradient(180deg,
    rgba(250,246,237,0.08) 0%,
    rgba(250,246,237,0.30) 45%,
    rgba(250,246,237,0.70) 72%,
    rgba(250,246,237,0.93) 88%,
    rgba(250,246,237,0.98) 100%
  );
}
.header-banner .header-inner{position:relative;z-index:2;text-align:center;width:100%;padding-top:260px}
.header-banner h1{font-family:'Ma Shan Zheng','ZCOOL XiaoWei','Noto Serif SC',serif;font-size:52px;color:var(--gold-dark);letter-spacing:8px;font-weight:900;text-shadow:0 0 20px rgba(201,162,39,0.3),0 2px 4px rgba(0,0,0,0.15),0 1px 0 rgba(255,255,255,0.5);line-height:1.3}
.header-banner .sub{position:relative;z-index:2;font-size:12.5px;color:var(--text-sec);margin-top:6px;letter-spacing:2px}
.header-banner .author-mark{position:relative;z-index:2;margin-top:8px;font-size:11px;color:var(--text-dim);letter-spacing:1px}
.header-banner .author-mark em{font-style:normal;color:var(--gold);font-weight:700}

/* ====== SIDEBAR ====== */
.sidebar{width:var(--side-w);background:linear-gradient(180deg,rgba(255,253,248,0.96),rgba(252,247,235,0.94));border-right:1px solid var(--gold-border);display:flex;flex-direction:column;flex-shrink:0;position:relative;z-index:10;box-shadow:3px 0 24px rgba(100,80,40,.06);backdrop-filter:blur(10px)}
.sidebar-header{padding:18px 16px 14px;border-bottom:1px solid var(--gold-border);position:relative}
.sidebar-header::after{content:'';position:absolute;bottom:0;left:16px;right:16px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-light),transparent)}
.sidebar-header h2{font-family:'ZCOOL XiaoWei','Noto Serif SC',serif;font-size:17px;color:var(--gold-dark);font-weight:700;letter-spacing:2px}
.sidebar-header .sub{font-size:11px;color:var(--text-dim);margin-top:3px}
.sidebar-stats{padding:8px 16px;font-size:11px;color:var(--text-sec);border-bottom:1px solid rgba(180,150,80,.12);display:flex;justify-content:space-between}
.search-box{margin:8px 12px;padding:8px 14px;border:1.5px solid var(--gold-border);border-radius:20px;font-size:13px;font-family:inherit;color:var(--text-pri);background:var(--card-bg);outline:none;transition:.3s}
.search-box:focus{border-color:var(--gold);box-shadow:0 0 14px var(--gold-glow)}
.search-box::placeholder{color:var(--text-dim)}
.nav{flex:1;overflow-y:auto;padding:6px 0}

.grade-title{padding:11px 16px;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;border-left:3px solid transparent;transition:.25s;color:var(--text-sec);letter-spacing:1.5px}
.grade-title:hover{background:rgba(200,160,60,.04);color:var(--text-head)}
.grade-title .gd-arrow{margin-left:auto;font-size:9px;transition:.3s;color:var(--gold)}
.grade-title .gd-arrow.open{transform:rotate(90deg)}
.grade-chapters.collapsed{display:none}

.chapter-item{padding:8px 16px 8px 32px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;border-left:2px solid transparent;transition:.2s;color:var(--text-sec);position:relative}
.chapter-item:hover{background:rgba(200,160,60,.04);color:var(--text-head)}
.chapter-item .ch-num{font-size:10px;color:var(--text-dim);min-width:22px;font-weight:500}
.chapter-item .badge{font-size:9px;color:#fff;padding:1px 8px;border-radius:10px;margin-left:auto}
.chapter-item .el-dot{width:7px;height:7px;border-radius:2px;transform:rotate(45deg);flex-shrink:0;margin-right:2px}
.chapter-item.active{font-weight:600}

.grade-title.g-7{color:var(--c7)}.grade-title.g-8{color:var(--c8)}.grade-title.g-9{color:var(--c9)}

.ch-item-7.active{background:linear-gradient(90deg,var(--c7-bg),transparent);color:var(--c7);border-left-color:var(--c7)}
.ch-item-8.active{background:linear-gradient(90deg,var(--c8-bg),transparent);color:var(--c8);border-left-color:var(--c8)}
.ch-item-9.active{background:linear-gradient(90deg,var(--c9-bg),transparent);color:var(--c9);border-left-color:var(--c9)}
/* 标签配色 */
.tc-7{color:var(--c7);border-color:rgba(74,143,194,0.25)}
.tc-8{color:var(--c8);border-color:rgba(92,184,92,0.25)}
.tc-9{color:var(--c9);border-color:rgba(155,111,201,0.25)}

.sidebar-close-btn{position:absolute;top:10px;right:10px;width:32px;height:32px;border:1px solid var(--gold-border);border-radius:50%;background:var(--card-bg);cursor:pointer;font-size:14px;color:var(--text-dim);line-height:30px;text-align:center;z-index:5;display:none}

/* ====== MAIN ====== */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}

.toolbar{padding:12px 24px;background:linear-gradient(180deg,rgba(255,252,245,0.96),rgba(250,246,237,0.92));border-bottom:1px solid var(--gold-border);display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;box-shadow:var(--shadow-sm);position:sticky;top:0;z-index:5;backdrop-filter:blur(8px)}
.toolbar h3{font-family:'ZCOOL XiaoWei','Noto Serif SC',serif;font-size:15.5px;color:var(--text-head);flex:1;min-width:140px;font-weight:600;letter-spacing:1px}
.toolbar .mode-tag{font-size:10px;padding:4px 12px;border-radius:12px;border:1.5px solid var(--gold-border);font-weight:500}
.mode-tag.view{color:var(--text-dim)}.mode-tag.edit{color:var(--gold-dark);border-color:var(--gold);background:var(--gold-glow)}
.toolbar button{padding:6px 14px;border:1.5px solid var(--gold-border);border-radius:8px;cursor:pointer;font-size:11px;font-family:inherit;background:linear-gradient(180deg,#fffef8,#f8f3e6);color:var(--text-sec);transition:.25s;white-space:nowrap;font-weight:500}
.toolbar button:hover{border-color:var(--gold);color:var(--gold-dark);background:linear-gradient(180deg,#faf5e6,#f2e8cc);box-shadow:0 2px 8px var(--gold-glow);transform:translateY(-1px)}
.toolbar button:active{transform:translateY(0)}
.toolbar .btn-gold{background:linear-gradient(135deg,#f5e6c3,#e8d4a0)!important;color:var(--gold-dark)!important;border-color:var(--gold)!important;font-weight:700!important;box-shadow:0 2px 10px rgba(201,162,39,0.25)!important}

/* 内容区 */
.content{flex:1;overflow-y:auto;padding:28px 36px;display:flex;flex-direction:column;gap:18px;position:relative;z-index:2;max-width:1100px;margin:0 auto;width:100%}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-dim);gap:16px;text-align:center;padding:60px 20px}
.empty-state .emblem{width:84px;height:84px;border:2px solid var(--gold-border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;background:rgba(200,160,60,.03);box-shadow:var(--shadow-sm)}
.empty-state h4{font-family:'ZCOOL XiaoWei','Noto Serif SC',serif;color:var(--text-sec);font-weight:500;letter-spacing:2px;font-size:16px}
.empty-state p{font-size:13px;line-height:2.2}

/* chapter meta */
.chapter-meta{display:flex;gap:16px;flex-wrap:wrap;align-items:center;padding:14px 20px;background:linear-gradient(135deg,rgba(255,252,245,0.95),rgba(253,249,240,0.92));border-radius:var(--radius);border:1px solid var(--gold-border);font-size:12.5px;box-shadow:var(--shadow-sm);backdrop-filter:blur(6px);position:relative;z-index:3}
.chapter-meta::before{content:'';position:absolute;top:0;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-light),transparent)}
.chapter-meta .meta-item{color:var(--text-sec)}.chapter-meta .meta-item b{color:var(--text-head);font-weight:600}

/* ====== 章节底部图片画廊 ====== */
.footer-gallery{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.footer-img-wrap{position:relative;border-radius:var(--radius);overflow:hidden;border:1.5px solid var(--gold-border);box-shadow:var(--shadow-sm)}
.footer-img-wrap img{width:100%;height:auto;display:block;max-height:400px;object-fit:cover;cursor:pointer;transition:.3s}
.footer-img-wrap img:hover{opacity:0.9;transform:scale(1.01)}
.footer-del{position:absolute;top:6px;right:6px;width:24px;height:24px;background:rgba(0,0,0,.55);color:#fff;border-radius:50%;font-size:12px;line-height:22px;text-align:center;cursor:pointer;z-index:2;transition:.2s}
.footer-del:hover{background:rgba(200,60,60,.85)}
.footer-del.hidden{display:none}

/* cards - v11 原神风格卡片 */
.section-card{background:linear-gradient(145deg,rgba(255,252,247,0.96),rgba(252,247,235,0.94));border-radius:var(--radius);overflow:hidden;border:1.5px solid var(--gold-border);box-shadow:var(--shadow-sm);transition:.3s;backdrop-filter:blur(6px);position:relative;z-index:3}
.section-card:hover{box-shadow:var(--shadow-md);border-color:rgba(200,160,60,.3);transform:translateY(-1px)}
.section-card::before{content:'';display:block;height:1.5px;background:linear-gradient(90deg,transparent,var(--gold-light),var(--gold),var(--gold-light),transparent);opacity:.6}
.card-hd{padding:13px 20px;display:flex;align-items:center;gap:10px;cursor:pointer;background:linear-gradient(135deg,rgba(245,239,222,.35),rgba(240,232,218,.2));transition:.2s}
.card-hd:hover{background:linear-gradient(135deg,rgba(245,239,222,.55),rgba(240,232,218,.35))}
.card-hd .hd-icon{font-size:17px;width:26px;text-align:center;flex-shrink:0}
.card-hd .hd-title{font-size:13.5px;font-weight:650;color:var(--text-head);flex:1;letter-spacing:0.5px}
.card-hd .hd-tag{font-size:10px;padding:2px 10px;border-radius:10px;border:1px solid;flex-shrink:0;font-weight:500}
.card-hd .hd-toggle{margin-left:auto;color:var(--text-dim);font-size:10px;transition:.3s}
.card-hd .hd-toggle.collapsed{transform:rotate(-90deg)}
.card-bd{padding:18px 20px}.card-bd.collapsed{display:none}

.card-bd textarea{width:100%;border:1.5px solid var(--gold-border);border-radius:8px;padding:13px;font-size:13.5px;font-family:inherit;color:var(--text-pri);background:rgba(250,247,240,.7);resize:vertical;min-height:110px;line-height:1.85;transition:.3s}
.card-bd textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 14px var(--gold-glow);background:rgba(255,253,248,0.85)}
.card-bd textarea::placeholder{color:var(--text-dim)}
.readonly-render{font-size:13.5px;line-height:2.1;color:var(--text-pri);min-height:18px}
.readonly-render:empty::after{content:'（暂无内容）';color:var(--text-dim);font-style:italic}
.readonly-render img{max-width:100%;border-radius:6px;margin:8px 0;border:1px solid var(--gold-border)}

.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tag-row .kw{font-size:10.5px;padding:4px 12px;border-radius:14px;border:1px solid var(--gold-border);color:var(--text-sec);cursor:pointer;transition:.2s;background:rgba(250,247,240,.6);font-weight:400}
.tag-row .kw:hover{border-color:var(--gold);color:var(--gold-dark);background:rgba(200,160,60,.06);transform:translateY(-1px)}

.upload-zone{border:1.5px dashed var(--gold-border);border-radius:8px;padding:16px;text-align:center;cursor:pointer;margin-top:10px;transition:.3s;background:rgba(250,247,240,.5)}
.upload-zone:hover{border-color:var(--gold);background:rgba(250,247,240,.75)}.upload-zone input{display:none}
.upload-zone .hint{color:var(--text-dim);font-size:12.5px}
.img-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.img-row .thumb{width:74px;height:74px;object-fit:cover;border-radius:6px;border:1px solid var(--gold-border);cursor:pointer;transition:.25s}
.img-row .thumb:hover{border-color:var(--gold);transform:scale(1.06);box-shadow:var(--shadow-sm)}

.math-bar{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0;padding:8px 12px;background:rgba(250,247,240,.65);border-radius:8px;border:1px solid rgba(180,150,80,.14)}
.math-bar button{padding:4px 9px;border:1.5px solid var(--gold-border);border-radius:5px;background:var(--card-bg);color:var(--text-sec);cursor:pointer;font-size:10.5px;font-family:monospace;transition:.2s;font-weight:500}
.math-bar button:hover{border-color:var(--gold);color:var(--gold-dark);background:linear-gradient(180deg,#fffef8,#f8f3e6)}
.math-bar .sep{width:1px;background:rgba(180,150,80,.2);margin:0 3px}
.math-preview{margin-top:8px;padding:12px;border-radius:8px;border:1px solid var(--gold-border);background:rgba(250,247,240,.65);min-height:26px;display:none;font-size:13.5px;overflow-x:auto}
.math-preview.show{display:block}

/* lightbox */
.lightbox{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.87);backdrop-filter:blur(10px);align-items:center;justify-content:center;cursor:pointer}
.lightbox.show{display:flex}
.lightbox img{max-width:92%;max-height:92%;border-radius:10px;border:2px solid var(--gold-light);box-shadow:0 8px 40px rgba(0,0,0,.4)}

/* password overlay */
.pwd-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center}
.pwd-overlay.hidden{display:none}
.pwd-box{background:linear-gradient(145deg,rgba(255,252,247,0.99),rgba(252,247,235,0.97));border:2px solid var(--gold);border-radius:14px;padding:28px 36px;text-align:center;box-shadow:var(--shadow-md)}
.pwd-box h4{font-family:'ZCOOL XiaoWei','Noto Serif SC',serif;color:var(--gold-dark);font-size:17px;margin-bottom:14px;letter-spacing:2px}
.pwd-box input{padding:11px 16px;border:1.5px solid var(--gold-border);border-radius:10px;font-size:15px;font-family:inherit;color:var(--text-pri);background:var(--ivory);width:220px;text-align:center;letter-spacing:3px}
.pwd-box input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 14px var(--gold-glow)}
.pwd-box .pwd-btns{margin-top:16px;display:flex;gap:12px;justify-content:center}
.pwd-box button{padding:9px 24px;border-radius:10px;cursor:pointer;font-size:13.5px;font-family:inherit;transition:.2s}
.pwd-box .btn-ok{background:linear-gradient(135deg,#f5e6c3,#e8d4a0);color:var(--gold-dark);border:1px solid var(--gold);font-weight:700}
.pwd-box .btn-ok:hover{box-shadow:0 3px 12px var(--gold-glow)}
.pwd-box .btn-cancel{background:var(--ivory);color:var(--text-sec);border:1px solid var(--gold-border)}
.pwd-box .btn-cancel:hover{background:var(--ivory-dark)}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 28px;border-radius:10px;background:linear-gradient(135deg,var(--gold-dark),#9a7b1a);color:#fff;font-size:13px;z-index:300;opacity:0;transition:.3s;pointer-events:none;letter-spacing:1px;font-weight:500}
.toast.show{opacity:1}

/* 进度条 */
.progress-bar{padding:12px 16px;border-top:1px solid var(--gold-border);background:rgba(250,246,237,.55)}
.progress-bar .prog-label{font-size:11.5px;color:var(--text-sec);display:flex;justify-content:space-between;margin-bottom:6px}
.progress-bar .prog-track{height:7px;background:var(--ivory-dark);border-radius:4px;overflow:hidden}
.progress-bar .prog-fill{height:100%;background:linear-gradient(90deg,var(--gold-light),var(--gold),var(--gold-light));border-radius:4px;transition:.6s ease}

/* ====== 富文本编辑器 ====== */
.editor-wrap{display:flex;flex-direction:column;gap:0}
.editor-toolbar{display:flex;flex-wrap:wrap;gap:4px;padding:8px 10px;background:linear-gradient(180deg,rgba(245,239,222,0.5),rgba(240,232,218,0.3));border:1.5px solid var(--gold-border);border-bottom:1px solid rgba(180,150,80,0.15);border-radius:8px 8px 0 0;align-items:center}
.editor-toolbar button{padding:4px 8px;border:1.5px solid var(--gold-border);border-radius:5px;background:var(--card-bg);color:var(--text-sec);cursor:pointer;font-size:12px;font-family:inherit;transition:.2s;line-height:1.4;white-space:nowrap}
.editor-toolbar button:hover{border-color:var(--gold);color:var(--gold-dark);background:linear-gradient(180deg,#fffef8,#f8f3e6)}
.editor-toolbar .tb-sep{width:1px;height:18px;background:rgba(180,150,80,0.2);margin:0 3px;flex-shrink:0}
.editor-toolbar .tb-label{font-size:10px;color:var(--text-dim);margin-right:2px;white-space:nowrap}
.editor-area{min-height:120px;max-height:500px;overflow-y:auto;padding:13px;font-size:13.5px;font-family:inherit;color:var(--text-pri);background:rgba(250,247,240,.7);border:1.5px solid var(--gold-border);border-top:none;border-radius:0 0 8px 8px;line-height:2;transition:.3s;white-space:pre-wrap;word-break:break-word;outline:none}
.editor-area:focus{border-color:var(--gold);box-shadow:0 0 14px var(--gold-glow);background:rgba(255,253,248,0.85)}
.editor-area img{max-width:100%;border-radius:6px;margin:4px 0;border:1px solid var(--gold-border)}
.editor-area h3{margin:8px 0 4px;color:var(--text-head);font-weight:700;font-size:15px}
.editor-area ul,.editor-area ol{margin:6px 0;padding-left:20px}
.editor-area a{color:var(--c1);text-decoration:underline}
.editor-area code{background:rgba(200,160,60,0.08);padding:1px 5px;border-radius:3px;font-size:12px;color:var(--gold-dark)}

<script>

// 每章分配的底部大图（每章一张）
const CH_FOOTER_IMG = {

  '7a-1':'scene_1','7a-2':'char_1','7a-3':'extra_1','7a-4':'extra_2','7a-5':'char_2','7a-6':'scene_2',
  // 七下

  // 八上
  '8a-1':'char_1','8a-2':'char_2','8a-3':'scene_1','8a-4':'extra_1','8a-5':'extra_7','8a-6':'scene_2',
  // 八下
  '8b-1':'scene_3','8b-2':'char_3','8b-3':'extra_3','8b-4':'extra_4','8b-5':'extra_5',
  // 九年级
  '9-1':'char_1','9-2':'char_2','9-3':'scene_1','9-4':'extra_1','9-5':'extra_2','9-6':'char_3','9-7':'scene_3','9-8':'extra_3','9-9':'extra_7'
};

const textbook={
  '七上':{chapters:[
    {id:'7a-1',num:1,name:'数学与我们同行',el:'风',keywords:['观察','思考','表达','数学建模']},
    {id:'7a-2',num:2,name:'有理数',el:'风',keywords:['正负数','数轴','绝对值','加减乘除','乘方']},
    {id:'7a-3',num:3,name:'代数式',el:'风',keywords:['字母表示数','多项式','整式','代数式求值']},
    {id:'7a-4',num:4,name:'一元一次方程',el:'风',keywords:['等式性质','移项','去分母','应用题']},
    {id:'7a-5',num:5,name:'走进几何世界',el:'岩',keywords:['几何体','展开图','三视图','点线面体']},
    {id:'7a-6',num:6,name:'平面图形的初步认识',el:'岩',keywords:['线段','射线','角','平行','垂直','对顶角']}]},
  '七下':{chapters:[
    {id:'7b-1',num:7,name:'幂的运算',el:'岩',keywords:['同底数幂','幂的乘方','积的乘方','零指数','负指数']},
    {id:'7b-2',num:8,name:'整式乘法',el:'岩',keywords:['单项式乘法','多项式乘法','平方差','完全平方']},
    {id:'7b-3',num:9,name:'图形的变换',el:'岩',keywords:['平移','旋转','轴对称','中心对称']},
    {id:'7b-4',num:10,name:'二元一次方程组',el:'岩',keywords:['代入消元','加减消元','三元一次','应用题']},
    {id:'7b-5',num:11,name:'一元一次不等式',el:'冰',keywords:['不等式性质','解集','数轴表示','不等式组']},
    {id:'7b-6',num:12,name:'定义·命题·证明',el:'冰',keywords:['命题','真命题','假命题','逆命题','反证法']}]},
  '八上':{chapters:[
    {id:'8a-1',num:1,name:'三角形',el:'雷',keywords:['三边关系','内角和','外角','全等判定','SSS','SAS','ASA','AAS','HL']},
    {id:'8a-2',num:2,name:'实数的初步认识',el:'雷',keywords:['平方根','立方根','无理数','实数','近似数']},
    {id:'8a-3',num:3,name:'勾股定理',el:'雷',keywords:['a²+b²=c²','逆定理','勾股数','最短路径']},
    {id:'8a-4',num:4,name:'平面直角坐标系',el:'雷',keywords:['象限','坐标','对称点','中点公式','距离公式']},
    {id:'8a-5',num:5,name:'一次函数',el:'火',keywords:['y=kx+b','k与b意义','图象','交点','待定系数法','分段函数']},
    {id:'8a-6',num:6,name:'数据的收集整理与描述',el:'火',keywords:['普查','抽样调查','频数分布','直方图']}]},
  '八下':{chapters:[
    {id:'8b-1',num:7,name:'认识概率',el:'草',keywords:['确定事件','随机事件','等可能性','频率估计概率']},
    {id:'8b-2',num:8,name:'四边形',el:'草',keywords:['平行四边形','矩形','菱形','正方形','中位线','判定']},
    {id:'8b-3',num:9,name:'因式分解',el:'草',keywords:['提公因式','平方差','完全平方','十字相乘','分组分解']},
    {id:'8b-4',num:10,name:'分式',el:'草',keywords:['分式运算','分式方程','增根','验根','应用题']},
    {id:'8b-5',num:11,name:'二次根式',el:'草',keywords:['√a意义','最简二次根式','乘除','加减','分母有理化']}]},
  '九年级':{chapters:[
    {id:'9-1',num:1,name:'反比例函数',el:'水',keywords:['y=k/x','双曲线','k几何意义','矩形面积','实际应用']},
    {id:'9-2',num:2,name:'一元二次方程',el:'水',keywords:['配方法','公式法','Δ判别式','韦达定理','根与系数','增长率']},
    {id:'9-3',num:3,name:'圆',el:'水',keywords:['圆心角','圆周角','切线','切线长','弦切角','弧长','扇形']},
    {id:'9-4',num:4,name:'数据的集中趋势和离散程度',el:'水',keywords:['平均数','中位数','众数','极差','方差','标准差']},
    {id:'9-5',num:5,name:'等可能条件下的概率',el:'水',keywords:['树状图','列表法','放回','不放回','概率乘法']},
    {id:'9-6',num:6,name:'二次函数',el:'火',keywords:['y=ax²+bx+c','顶点','对称轴','最值','平移','交点式']},

    {id:'9-8',num:8,name:'锐角三角函数',el:'冰',keywords:['sin','cos','tan','特殊角','解直角三角形']},
    {id:'9-9',num:9,name:'投影与视图',el:'冰',keywords:['平行投影','中心投影','三视图','展开图']}]}};

let totalChapters=32;

let isEditMode=false,currentChapter=null,chapterData={};

function loadData(){
  const s=localStorage.getItem('skb7_data');if(s){try{chapterData=JSON.parse(s)}catch{chapterData={}}}
  updateStats()}
function saveData(){localStorage.setItem('skb7_data',JSON.stringify(chapterData));updateStats();showToast('已保存')}
let at;function autoSave(){clearTimeout(at);at=setTimeout(()=>{localStorage.setItem('skb7_data',JSON.stringify(chapterData));updateStats()},600)}function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function updateStats(){
  let f=0,w=0;
  for(const d of Object.values(chapterData)){const t=[d.knowledge,d.competency,d.mistakes,d.kax,d.lessonPlan,d.homework].filter(Boolean).join('');if(t.length>10)f++;w+=t.length}
  document.getElementById('stats-filled').textContent=f;
  document.getElementById('stats-words').textContent=Math.round(w/1000);
  document.getElementById('progPct').textContent=Math.round(f/totalChapters*100)+'%';
  document.getElementById('progFill').style.width=Math.round(f/totalChapters*100)+'%';
}

function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlayMask').classList.add('show')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlayMask').classList.remove('show')}
function selAndClose(ch,item){selectChapter(ch,item);if(window.innerWidth<=768)closeSidebar()}

function toggleEditMode(){
  if(isEditMode){isEditMode=false;document.getElementById('modeBadge').className='mode-tag view';document.getElementById('modeBadge').textContent='只读';document.getElementById('btnEditToggle').textContent='开启编辑';document.getElementById('btnSave').style.display='none';if(currentChapter)renderContent(currentChapter)}
  else{document.getElementById('pwdOverlay').classList.remove('hidden');document.getElementById('pwdInput').value='';document.getElementById('pwdInput').focus()}}
function checkPwd(){if(document.getElementById('pwdInput').value===EP){isEditMode=true;document.getElementById('pwdOverlay').classList.add('hidden');document.getElementById('modeBadge').className='mode-tag edit';document.getElementById('modeBadge').textContent='编辑中';document.getElementById('btnEditToggle').textContent='退出编辑';document.getElementById('btnSave').style.display='';if(currentChapter)renderContent(currentChapter);showToast('编辑模式已开启')}else{showToast('密码错误')}}

function getGrade(id){if(id.startsWith('7a'))return'七上';if(id.startsWith('7b'))return'七下';if(id.startsWith('8a'))return'八上';if(id.startsWith('8b'))return'八下';return'九年级'}

// 设置背景图
function setGradeBg(grade){
  const gc=gColors[grade];
  const bgLayer=document.getElementById('bgLayer');
  if(IMG_DATA[gc.bgRole]){
    bgLayer.style.backgroundImage='url('+IMG_DATA[gc.bgRole]+')';
  }
}

// 设置页眉（img标签完整展示）
function setHeader(){
  const hb=document.getElementById('headerBanner');
  if(IMG_DATA['header']){
    const img=document.createElement('img');
    img.src=IMG_DATA['header'];
    img.alt='';img.className='header-full-img';
    img.loading='eager';
    // 插入到header-inner之前作为背景图
    hb.insertBefore(img, hb.firstChild);
  }
}

// 生成章节底部大图HTML
function footerImgHtml(chId){
  const role=CH_FOOTER_IMG[chId];
  if(!role||!IMG_DATA[role]) return '';
  return '<div class="chapter-footer-img"><img src=\"'+IMG_DATA[role]+'\" alt="" loading="lazy" onclick="openLb(this.src)"></div>';
}

function renderNav(){
  const nav=document.getElementById('chapterNav');nav.innerHTML='';
  for(const[grade,data]of Object.entries(textbook)){
    const gc=gColors[grade],g=document.createElement('div');g.className='grade-group';
    const t=document.createElement('div');t.className='grade-title g-'+gc.idx;t.innerHTML=grade+' <span class="gd-arrow open">▶</span>';
    t.onclick=()=>{const c=g.querySelector('.grade-chapters');c.classList.toggle('collapsed');t.querySelector('.gd-arrow').classList.toggle('open')};
    const cd=document.createElement('div');cd.className='grade-chapters';
    data.chapters.forEach(ch=>{
      const item=document.createElement('div');item.className='chapter-item '+gc.chCls;item.dataset.id=ch.id;item.dataset.grade=grade;item.dataset.name=ch.name;
      let filled=false;const d=chapterData[ch.id];if(d){const tx=Object.values(d).filter(Boolean).join('');if(tx.length>10)filled=true}
      const dotColor=gc.acc;
      item.innerHTML='<span class="el-dot" style="background:'+dotColor+'"></span><span class="ch-num">'+ch.num+'</span>'+ch.name+(filled?'<span class="badge" style="background:'+gc.acc+'">✦</span>':'');
      item.onclick=()=>selAndClose(ch,item);cd.appendChild(item)});
    g.appendChild(t);g.appendChild(cd);nav.appendChild(g)}}
function filterChapters(){const q=document.getElementById('searchBox').value.toLowerCase();document.querySelectorAll('.chapter-item').forEach(it=>{const n=(it.dataset.name||'').toLowerCase(),g=(it.dataset.grade||'').toLowerCase();it.style.display=(!q||n.includes(q)||g.includes(q))?'':'none'})}

function selectChapter(ch,item){
  currentChapter=ch;document.querySelectorAll('.chapter-item.active').forEach(el=>el.classList.remove('active'));item.classList.add('active');
  document.getElementById('currentTitle').textContent='第'+ch.num+'章 · '+ch.name;
  setGradeBg(getGrade(ch.id));
  if(!chapterData[ch.id])chapterData[ch.id]={knowledge:'',competency:'',mistakes:'',kax:'',lessonPlan:'',homework:'',images:[]};renderContent(ch)}

function renderContent(ch){
  const d=chapterData[ch.id],main=document.getElementById('mainContent'),ed=isEditMode,grade=getGrade(ch.id),gc=gColors[grade];
  const secs=[
    {f:'knowledge',icon:'\uD83D\uDCD6',title:'知识要点',tag:'核心',ph:'本章核心知识点、公式、定理、性质……',st:true},
    {f:'competency',icon:'\uD83C\uDFAF',title:'核心素养与教学目标',tag:'课标',ph:'六大核心素养目标、教学重难点、教学方法……'},
    {f:'mistakes',icon:'\u26A0\uFE0F',title:'易错清单',tag:'错因',ph:'学生常见错误类型、认知根源分析、干预策略……'},

// 富文本编辑器相关
function onEditorInput(el,f,id){autoSaveCh(id,f,el.innerHTML)}
function execCmd(cmd,btn){document.execCommand(cmd,false,null);if(btn)setTimeout(()=>btn.classList.toggle('active',document.queryCommandState(cmd)),10)}
function execCmdVal(cmd,val,btn){document.execCommand(cmd,false,val)}
function doFontSize(size,f){const el=document.querySelector('.editor-area[data-field="'+f+'"]');if(!el)return;el.focus();document.execCommand('fontSize',false,size)}
function doForeColor(color,f){const el=document.querySelector('.editor-area[data-field="'+f+'"]');if(!el)return;el.focus();document.execCommand('foreColor',false,color)}
function insertLink(f){const url=prompt('输入链接地址：','https://');if(!url)return;document.execCommand('createLink',false,url)}
function insertImgToEditor(chId,f,btn){
  const input=document.createElement('input');input.type='file';input.accept='image/*';
  input.onchange=function(){const file=this.files[0];if(!file)return;compressImgToEditor(file,chId,f)};
  input.click();
}
function compressImgToEditor(file,chId,f){
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      let w=img.width,h=img.height;
      if(w>600){h=Math.round(h*600/w);w=600}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl=c.toDataURL('image/jpeg',0.72);
      const el=document.querySelector('.editor-area[data-field="'+f+'"]');
      if(el){el.focus();document.execCommand('insertImage',false,dataUrl);onEditorInput(el,f,chId)}
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function onEditorPaste(e,el,chId,f){
  const items=e.clipboardData.items;
  for(let i=0;i<items.length;i++){
    if(items[i].type.indexOf('image')!==-1){
      e.preventDefault();
      const file=items[i].getAsFile();
      compressImgToEditor(file,chId,f);
      return;
    }
  }
  setTimeout(()=>onEditorInput(el,f,chId),50);
}
function bindEditorDrop(){
  document.querySelectorAll('.editor-area').forEach(el=>{
    el.addEventListener('dragover',function(e){e.preventDefault();this.style.borderColor='var(--gold)';this.style.background='rgba(200,160,60,0.08)'});
    el.addEventListener('dragleave',function(e){e.preventDefault();this.style.borderColor='';this.style.background=''});
    el.addEventListener('drop',function(e){
      e.preventDefault();this.style.borderColor='';this.style.background='';
      const files=e.dataTransfer.files;
      if(files.length>0&&files[0].type.startsWith('image/')){
        const f=this.dataset.field,id=currentChapter?id:'';
        compressImgToEditor(files[0],id,f)
      }
    })
  });
}
// 标签插入（富文本版）
function insTagToEditor(id,f,text){
  const el=document.querySelector('.editor-area[data-field="'+f+'"]');
  if(!el)return;
  el.focus();
  document.execCommand('insertText',false,text);
  onEditorInput(el,f,id);
}
// 公式插入
function insLT(id,code){
  const el=document.querySelector('#mainContent .editor-area');
  if(!el)return;
  el.focus();
  document.execCommand('insertText',false,code);
  const f=el.dataset.field;
  onEditorInput(el,f,id);
}
// 图片压缩通用
function compressImg(file,maxW,quality,cb){
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',quality));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
// 图片素材区上传（压缩）
function uploadImg(id,input){
  const file=input.files[0];if(!file)return;
  compressImg(file,400,0.65,function(dataUrl){
    if(!chapterData[id])chapterData[id]={};
    if(!chapterData[id].images)chapterData[id].images=[];
    chapterData[id].images.push(dataUrl);
    autoSave();renderContent(currentChapter);showToast('已上传');
  });
  input.value='';
}
// 章节配图上传（压缩）
function uploadFooterImg(chId,input){
  const file=input.files[0];if(!file)return;
  compressImg(file,900,0.78,function(dataUrl){
    if(!chapterData[chId])chapterData[chId]={};
    if(!chapterData[chId].footerImgs)chapterData[chId].footerImgs=[];
    chapterData[chId].footerImgs.push(dataUrl);
    autoSave();renderContent(currentChapter);showToast('配图已添加');
  });
  input.value='';
}
function delFooterImg(chId,idx){
  if(chapterData[chId]&&chapterData[chId].footerImgs){
    chapterData[chId].footerImgs.splice(idx,1);
    autoSave();renderContent(currentChapter);showToast('已删除');
  }
}


// ====== GitHub 云端同步 ======
let githubToken='';
function setGithubToken(){
  const t=prompt('输入GitHub Personal Access Token（repo权限）：',(githubToken||''));
  if(t!==null){githubToken=t;localStorage.setItem('skb_github_token',t);showToast('Token已保存')}
}
function loadGithubToken(){githubToken=localStorage.getItem('skb_github_token')||''}
function saveToCloud(){
  if(!githubToken){setGithubToken();if(!githubToken)return}
  const data=JSON.stringify(chapterData,null,2);
  const content=btoa(unescape(encodeURIComponent(data)));
  const sha=window._cloudSha||'';
  const body={message:'auto: 备份备课数据 '+new Date().toISOString().slice(0,10)+' '+new Date().toTimeString().slice(0,5),content:content};
  if(sha)body.sha=sha;
  fetch('https://api.github.com/repos/anankax/skb-math/contents/data.json',{method:'PUT',headers:{Authorization:'token '+githubToken,'Accept':'application/vnd.github.v3+json'},body:JSON.stringify(body)})
    .then(r=>{if(!r.ok)return r.json().then(e=>{throw new Error(e.message||'保存失败')});return r.json()})
    .then(j=>{window._cloudSha=j.sha;showToast('✅ 已推送到云端')})
    .catch(e=>{showToast('❌ 推送失败: '+e.message)});
}
function loadFromCloud(){
  if(!githubToken){setGithubToken();if(!githubToken)return}
  showToast('⏳ 正在拉取...');
  fetch('https://api.github.com/repos/anankax/skb-math/contents/data.json',{headers:{Authorization:'token '+githubToken,'Accept':'application/vnd.github.v3+json'}})
    .then(r=>{if(r.status===404){showToast('云端暂无数据');return null}if(!r.ok)return r.json().then(e=>{throw new Error(e.message||'拉取失败')});return r.json()})
    .then(j=>{
      if(!j)return;
      window._cloudSha=j.sha;
      const data=decodeURIComponent(escape(atob(j.content)));
      chapterData=JSON.parse(data);
      localStorage.setItem('skb7_data',data);
      updateStats();
      if(currentChapter)renderContent(currentChapter);
      showToast('✅ 已从云端拉取');
    })
    .catch(e=>{showToast('❌ 拉取失败: '+e.message)});
}
