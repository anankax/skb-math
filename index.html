<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初中数学</title>
<script>MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']],displayMath:[['$$','$$'],['\\[','\\]']]},svg:{fontCache:'global'}};</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap');
:root{
  --ivory:#faf6ed;--ivory-dark:#f0e8d8;--card-bg:rgba(255,252,245,0.92);--card-bg2:rgba(253,249,240,0.94);
  --gold:#c9a227;--gold-light:#dfc47a;--gold-dark:#8b6914;--gold-glow:rgba(201,162,39,0.15);
  --gold-border:rgba(180,150,80,0.25);--text-pri:#4a3c2d;--text-sec:#7a6b58;--text-dim:#a09585;--text-head:#3d3020;
  --shadow-sm:0 2px 8px rgba(120,90,40,0.06);--shadow-md:0 4px 20px rgba(120,90,40,0.10);
  --radius:12px;--side-w:280px;
  /* 六元素方案：风岩雷草水火 */
  --c1:#5b9bd5;--c1-bg:rgba(91,155,213,0.06);--c1-glow:rgba(91,155,213,0.08);
  --c2:#c9a96e;--c2-bg:rgba(201,169,110,0.06);--c2-glow:rgba(201,169,110,0.08);
  --c3:#9b7fd4;--c3-bg:rgba(155,127,212,0.06);--c3-glow:rgba(155,127,212,0.08);
  --c4:#6daa6f;--c4-bg:rgba(109,170,111,0.06);--c4-glow:rgba(109,170,111,0.08);
  --c5:#5babc4;--c5-bg:rgba(91,171,196,0.06);--c5-glow:rgba(91,171,196,0.08);
  --c6:#e07b54;--c6-bg:rgba(224,123,84,0.06);--c6-glow:rgba(224,123,84,0.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Noto Serif SC","Microsoft YaHei","微软雅黑",serif;
  color:var(--text-pri);min-height:100vh;overflow-x:hidden;
  background:transparent;position:relative;
}

/* ====== 背景图层 ====== */
.bg-layer{
  position:fixed;inset:0;z-index:-1;
  background-size:cover;background-position:center;background-repeat:no-repeat;
  opacity:0.62;filter:blur(0.5px);
  transition:background-image 1.5s ease;
}
.bg-layer::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 35%,rgba(250,246,237,0.10) 0%,rgba(250,246,237,0.30) 55%,rgba(250,246,237,0.50) 100%);
}
.bg-layer.pure{opacity:1;filter:none;z-index:5}
.bg-layer.pure::after{display:none}

/* ====== 汉堡菜单 ====== */
.menu-btn{display:none;position:fixed;top:12px;left:12px;z-index:101;width:44px;height:44px;border:1px solid var(--gold-border);border-radius:10px;background:var(--card-bg);cursor:url('images/cursor_pointer.cur'),pointer;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
.menu-btn span{display:block;width:20px;height:2px;background:var(--gold-dark);position:relative;transition:.3s}
.menu-btn span::before,.menu-btn span::after{content:'';display:block;width:20px;height:2px;background:var(--gold-dark);position:absolute;transition:.3s}
.menu-btn span::before{top:-6px}.menu-btn span::after{top:6px}
.overlay-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;backdrop-filter:blur(3px)}
.overlay-mask.show{display:block}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--ivory-dark)}::-webkit-scrollbar-thumb{background:linear-gradient(var(--gold-light),var(--gold));border-radius:3px}

.app{display:flex;min-height:100vh}

/* ====== 页眉横幅 - 完整展示角色 ====== */
.header-banner{
  position:relative;width:100%;overflow:hidden;
  flex-shrink:0;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;padding:0 28px 18px;
  border-bottom:none;
  min-height:380px;
}
.header-banner .header-full-img{
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:cover;object-position:center top;
}
/* 渐变遮罩——极轻，让图片完整可见 */
.header-banner::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;z-index:1;
  background:linear-gradient(180deg,
    rgba(250,246,237,0.00) 0%,
    rgba(250,246,237,0.08) 40%,
    rgba(250,246,237,0.35) 70%,
    rgba(250,246,237,0.70) 88%,
    rgba(250,246,237,0.92) 100%
  );
}
.header-banner .header-inner{position:relative;z-index:2;text-align:center;width:100%;padding-top:260px}
.header-banner h1{font-family:'Ma Shan Zheng','ZCOOL XiaoWei','Noto Serif SC',serif;font-size:52px;color:var(--gold-dark);letter-spacing:8px;font-weight:900;text-shadow:0 0 20px rgba(201,162,39,0.3),0 2px 4px rgba(0,0,0,0.15),0 1px 0 rgba(255,255,255,0.5);line-height:1.3}
.header-banner .sub{position:relative;z-index:2;font-size:12.5px;color:var(--text-sec);margin-top:6px;letter-spacing:2px}
.header-banner .author-mark{position:relative;z-index:2;margin-top:8px;font-size:11px;color:var(--text-dim);letter-spacing:1px}
.header-banner .author-mark em{font-style:normal;color:var(--gold);font-weight:700}

/* ====== SIDEBAR ====== */
.sidebar{width:var(--side-w);background:linear-gradient(180deg,rgba(255,253,248,0.96),rgba(252,247,235,0.94));border-right:1px solid var(--gold-border);display:flex;flex-direction:column;flex-shrink:0;position:relative;z-index:10;box-shadow:3px 0 24px rgba(100,80,40,.06);backdrop-filter:blur(10px);overflow-y:auto;overflow-x:hidden}
.sidebar-header{padding:16px 14px 12px;border-bottom:1px solid var(--gold-border);position:relative;text-align:center}
.sidebar-title-img{max-width:180px;width:75%;height:auto;margin:0 auto 6px;display:block;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.15))}
.sidebar-header::after{content:'';position:absolute;bottom:0;left:16px;right:16px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-light),transparent)}
.sidebar-header h2{font-family:'ZCOOL XiaoWei','Noto Serif SC',serif;font-size:17px;color:var(--gold-dark);font-weight:700;letter-spacing:2px}
.sidebar-header .sub{font-size:11px;color:var(--text-dim);margin-top:3px}
.sidebar-stats{padding:8px 16px;font-size:11px;color:var(--text-sec);border-bottom:1px solid rgba(180,150,80,.12);display:flex;justify-content:space-between}
.search-box{margin:8px 12px;padding:8px 14px;border:1.5px solid var(--gold-border);border-radius:20px;font-size:13px;font-family:inherit;color:var(--text-pri);background:var(--card-bg);outline:none;transition:.3s}
.search-box:focus{border-color:var(--gold);box-shadow:0 0 14px var(--gold-glow)}
.search-box::placeholder{color:var(--text-dim)}
.nav{flex:1;overflow-y:auto;padding:6px 0}

.grade-title{padding:11px 16px;font-size:12.5px;font-weight:600;cursor:url('images/cursor_pointer.cur'),pointer;display:flex;align-items:center;gap:8px;border-left:3px solid transparent;transition:.25s;color:var(--text-sec);letter-spacing:1.5px}
.grade-title:hover{background:rgba(200,160,60,.04);color:var(--text-head)}
.grade-title .gd-arrow{margin-left:auto;font-size:9px;transition:.3s;color:var(--gold)}
.grade-title .gd-arrow.open{transform:rotate(90deg)}
.grade-chapters.collapsed{display:none}

.chapter-item{padding:8px 16px 8px 32px;font-size:12px;cursor:url('images/cursor_pointer.cur'),pointer;display:flex;align-items:center;gap:6px;border-left:2px solid transparent;transition:.2s;color:var(--text-sec);position:relative}
.chapter-item:hover{background:rgba(200,160,60,.04);color:var(--text-head)}
.chapter-item .ch-num{font-size:10px;color:var(--text-dim);min-width:22px;font-weight:500}
.chapter-item .badge{font-size:9px;color:#fff;padding:1px 8px;border-radius:10px;margin-left:auto}
.chapter-item .el-dot{width:7px;height:7px;border-radius:2px;transform:rotate(45deg);flex-shrink:0;margin-right:2px}
.chapter-item.active{font-weight:600}

/* 六年级标题色（风岩雷草水火） */
.grade-title.g-1{border-left-color:var(--c1);background:var(--c1-bg);color:var(--c1)}
.grade-title.g-2{border-left-color:var(--c2);background:var(--c2-bg);color:var(--c2)}
.grade-title.g-3{border-left-color:var(--c3);background:var(--c3-bg);color:var(--c3)}
.grade-title.g-4{border-left-color:var(--c4);background:var(--c4-bg);color:var(--c4)}
.grade-title.g-5{border-left-color:var(--c5);background:var(--c5-bg);color:var(--c5)}
.grade-title.g-6{border-left-color:var(--c6);background:var(--c6-bg);color:var(--c6)}

.ch-item-1.active{background:linear-gradient(90deg,var(--c1-bg),transparent);color:var(--c1);border-left-color:var(--c1)}
.ch-item-2.active{background:linear-gradient(90deg,var(--c2-bg),transparent);color:var(--c2);border-left-color:var(--c2)}
.ch-item-3.active{background:linear-gradient(90deg,var(--c3-bg),transparent);color:var(--c3);border-left-color:var(--c3)}
.ch-item-4.active{background:linear-gradient(90deg,var(--c4-bg),transparent);color:var(--c4);border-left-color:var(--c4)}
.ch-item-5.active{background:linear-gradient(90deg,var(--c5-bg),transparent);color:var(--c5);border-left-color:var(--c5)}
.ch-item-6.active{background:linear-gradient(90deg,var(--c6-bg),transparent);color:var(--c6);border-left-color:var(--c6)}
/* 标签配色（六元素） */
.tc-1{color:var(--c1);border-color:rgba(91,155,213,0.25)}
.tc-2{color:var(--c2);border-color:rgba(201,169,110,0.25)}
.tc-3{color:var(--c3);border-color:rgba(155,127,212,0.25)}
.tc-4{color:var(--c4);border-color:rgba(109,170,111,0.25)}
.tc-5{color:var(--c5);border-color:rgba(91,171,196,0.25)}
.tc-6{color:var(--c6);border-color:rgba(224,123,84,0.25)}

/* 自定义光标 */
*{cursor:url('images/cursor_default.cur'),auto}
a,button,[onclick],input[type="submit"],input[type="button"],select,[role="button"],[tabindex],.chapter-item,.grade-title,.enter-btn,.upload-zone,.thumb,.footer-img-wrap img,.footer-del,.menu-btn,.sidebar-close-btn,.card-hd,.tag-row .kw,.lightbox,.toolbar button,.math-bar button,.pwd-box button,.editor-toolbar button,.editor-toolbar select,.editor-toolbar input,.editor-area,.color-swatch{cursor:url('images/cursor_pointer.cur'),pointer}
input[type="text"],input[type="password"],input[type="number"],textarea{cursor:url('images/cursor_default.cur'),text}

/* 侧边栏元素图标 */
.el-icon{width:18px;height:18px;object-fit:contain;vertical-align:middle;flex-shrink:0;border-radius:3px}
.region-tag{font-size:9px;font-weight:600;padding:1px 7px;border-radius:8px;margin-left:auto;opacity:0.8;letter-spacing:1px;text-transform:uppercase}

/* 章节meta元素徽章 */
.el-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;letter-spacing:1px}
.el-badge .el-icon-sm{width:14px;height:14px;object-fit:contain}

.sidebar-close-btn{position:absolute;top:10px;right:10px;width:32px;height:32px;border:1px solid var(--gold-border);border-radius:50%;background:var(--card-bg);cursor:url('images/cursor_pointer.cur'),pointer;font-size:14px;color:var(--text-dim);line-height:30px;text-align:center;z-index:5;display:none}

/* ====== MAIN ====== */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}

.toolbar{padding:12px 24px;background:linear-gradient(180deg,rgba(255,252,245,0.96),rgba(250,246,237,0.92));border-bottom:1px solid var(--gold-border);display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;box-shadow:var(--shadow-sm);position:sticky;top:0;z-index:5;backdrop-filter:blur(8px)}
.toolbar h3{font-family:'ZCOOL XiaoWei','Noto Serif SC',serif;font-size:15.5px;color:var(--text-head);flex:1;min-width:140px;font-weight:600;letter-spacing:1px}
.toolbar .mode-tag{font-size:10px;padding:4px 12px;border-radius:12px;border:1.5px solid var(--gold-border);font-weight:500}
.mode-tag.view{color:var(--text-dim)}.mode-tag.edit{color:var(--gold-dark);border-color:var(--gold);background:var(--gold-glow)}
.toolbar button{padding:6px 14px;border:1.5px solid var(--gold-border);border-radius:8px;cursor:url('images/cursor_pointer.cur'),pointer;font-size:11px;font-family:inherit;background:linear-gradient(180deg,#fffef8,#f8f3e6);color:var(--text-sec);transition:.25s;white-space:nowrap;font-weight:500}
.toolbar button:hover{border-color:var(--gold);color:var(--gold-dark);background:linear-gradient(180deg,#faf5e6,#f2e8cc);box-shadow:0 2px 8px var(--gold-glow);transform:translateY(-1px)}
.toolbar button:active{transform:translateY(0)}
.toolbar .btn-gold{background:linear-gradient(135deg,#f5e6c3,#e8d4a0)!important;color:var(--gold-dark)!important;border-color:var(--gold)!important;font-weight:700!important;box-shadow:0 2px 10px rgba(201,162,39,0.25)!important}

/* 内容区 */
.content{flex:1;overflow-y:auto;padding:28px 36px;display:flex;flex-direction:column;gap:18px;position:relative;z-index:2;max-width:1100px;margin:0 auto;width:100%}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-dim);gap:16px;text-align:center;padding:60px 20px}
.empty-state .emblem{width:84px;height:84px;border:2px solid var(--gold-border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;background:rgba(200,160,60,.03);box-shadow:var(--shadow-sm)}
.empty-state h4{font-family:'ZCOOL XiaoWei','Noto Serif SC',serif;color:var(--text-sec);font-weight:500;letter-spacing:2px;font-size:16px}
.empty-state p{font-size:13px;line-height:2.2}

/* chapter meta */
.chapter-meta{display:flex;gap:16px;flex-wrap:wrap;align-items:center;padding:14px 20px;background:linear-gradient(135deg,rgba(255,252,245,0.95),rgba(253,249,240,0.92));border-radius:var(--radius);border:1px solid var(--gold-border);font-size:12.5px;box-shadow:var(--shadow-sm);backdrop-filter:blur(6px);position:relative;z-index:3}
.chapter-meta::before{content:'';position:absolute;top:0;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-light),transparent)}
.chapter-meta .meta-item{color:var(--text-sec)}.chapter-meta .meta-item b{color:var(--text-head);font-weight:600}

/* ====== 章节底部图片画廊 ====== */
.footer-gallery{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.footer-img-wrap{position:relative;border-radius:var(--radius);overflow:hidden;border:1.5px solid var(--gold-border);box-shadow:var(--shadow-sm)}
.footer-img-wrap img{width:100%;height:auto;display:block;max-height:400px;object-fit:cover;cursor:url('images/cursor_pointer.cur'),pointer;transition:.3s}
.footer-img-wrap img:hover{opacity:0.9;transform:scale(1.01)}
.footer-del{position:absolute;top:6px;right:6px;width:24px;height:24px;background:rgba(0,0,0,.55);color:#fff;border-radius:50%;font-size:12px;line-height:22px;text-align:center;cursor:url('images/cursor_pointer.cur'),pointer;z-index:2;transition:.2s}
.footer-del:hover{background:rgba(200,60,60,.85)}
.footer-del.hidden{display:none}

/* cards - v11 原神风格卡片 */
.section-card{background:linear-gradient(145deg,rgba(255,252,247,0.96),rgba(252,247,235,0.94));border-radius:var(--radius);overflow:hidden;border:1.5px solid var(--gold-border);box-shadow:var(--shadow-sm);transition:.3s;backdrop-filter:blur(6px);position:relative;z-index:3}
.section-card:hover{box-shadow:var(--shadow-md);border-color:rgba(200,160,60,.3);transform:translateY(-1px)}
.section-card::before{content:'';display:block;height:1.5px;background:linear-gradient(90deg,transparent,var(--gold-light),var(--gold),var(--gold-light),transparent);opacity:.6}
.card-hd{padding:13px 20px;display:flex;align-items:center;gap:10px;cursor:url('images/cursor_pointer.cur'),pointer;background:linear-gradient(135deg,rgba(245,239,222,.35),rgba(240,232,218,.2));transition:.2s}
.card-hd:hover{background:linear-gradient(135deg,rgba(245,239,222,.55),rgba(240,232,218,.35))}
.card-hd .hd-icon{font-size:17px;width:26px;text-align:center;flex-shrink:0}
.card-hd .hd-title{font-size:13.5px;font-weight:650;color:var(--text-head);flex:1;letter-spacing:0.5px}
.card-hd .hd-tag{font-size:10px;padding:2px 10px;border-radius:10px;border:1px solid;flex-shrink:0;font-weight:500}
.card-hd .hd-toggle{margin-left:auto;color:var(--text-dim);font-size:10px;transition:.3s}
.card-hd .hd-toggle.collapsed{transform:rotate(-90deg)}
.card-bd{padding:18px 20px}.card-bd.collapsed{display:none}

.card-bd textarea{width:100%;border:1.5px solid var(--gold-border);border-radius:8px;padding:13px;font-size:13.5px;font-family:inherit;color:var(--text-pri);background:rgba(250,247,240,.7);resize:vertical;min-height:110px;line-height:1.85;transition:.3s}
.card-bd textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 14px var(--gold-glow);background:rgba(255,253,248,0.85)}
.card-bd textarea::placeholder{color:var(--text-dim)}
.readonly-render{font-size:13.5px;line-height:2.1;color:var(--text-pri);min-height:18px}
.readonly-render:empty::after{content:'（暂无内容）';color:var(--text-dim);font-style:italic}
.readonly-render img{max-width:100%;border-radius:6px;margin:8px 0;border:1px solid var(--gold-border)}

.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tag-row .kw{font-size:10.5px;padding:4px 12px;border-radius:14px;border:1px solid var(--gold-border);color:var(--text-sec);cursor:url('images/cursor_pointer.cur'),pointer;transition:.2s;background:rgba(250,247,240,.6);font-weight:400}
.tag-row .kw:hover{border-color:var(--gold);color:var(--gold-dark);background:rgba(200,160,60,.06);transform:translateY(-1px)}

.upload-zone{border:1.5px dashed var(--gold-border);border-radius:8px;padding:16px;text-align:center;cursor:url('images/cursor_pointer.cur'),pointer;margin-top:10px;transition:.3s;background:rgba(250,247,240,.5)}
.upload-zone:hover{border-color:var(--gold);background:rgba(250,247,240,.75)}.upload-zone input{display:none}
.upload-zone .hint{color:var(--text-dim);font-size:12.5px}
.img-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.img-row .thumb{width:74px;height:74px;object-fit:cover;border-radius:6px;border:1px solid var(--gold-border);cursor:url('images/cursor_pointer.cur'),pointer;transition:.25s}
.img-row .thumb:hover{border-color:var(--gold);transform:scale(1.06);box-shadow:var(--shadow-sm)}

.math-bar{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0;padding:8px 12px;background:rgba(250,247,240,.65);border-radius:8px;border:1px solid rgba(180,150,80,.14)}
.math-bar button{padding:4px 9px;border:1.5px solid var(--gold-border);border-radius:5px;background:var(--card-bg);color:var(--text-sec);cursor:url('images/cursor_pointer.cur'),pointer;font-size:10.5px;font-family:monospace;transition:.2s;font-weight:500}
.math-bar button:hover{border-color:var(--gold);color:var(--gold-dark);background:linear-gradient(180deg,#fffef8,#f8f3e6)}
.math-bar .sep{width:1px;background:rgba(180,150,80,.2);margin:0 3px}
.math-preview{margin-top:8px;padding:12px;border-radius:8px;border:1px solid var(--gold-border);background:rgba(250,247,240,.65);min-height:26px;display:none;font-size:13.5px;overflow-x:auto}
.math-preview.show{display:block}

/* lightbox */
.lightbox{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.87);backdrop-filter:blur(10px);align-items:center;justify-content:center;cursor:url('images/cursor_pointer.cur'),pointer}
.lightbox.show{display:flex}
.lightbox img{max-width:92%;max-height:92%;border-radius:10px;border:2px solid var(--gold-light);box-shadow:0 8px 40px rgba(0,0,0,.4)}

/* 纯净欣赏背景按钮 */
.pure-btn{
  position:fixed;top:16px;right:16px;z-index:50;
  width:40px;height:40px;border:1px solid var(--gold-border);border-radius:50%;
  background:var(--card-bg);display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--gold-dark);box-shadow:var(--shadow-sm);
  cursor:url('images/cursor_pointer.cur'),pointer;transition:.3s;
}
.pure-btn:hover{background:var(--gold-light);color:var(--gold-dark);transform:scale(1.1)}
.pure-btn.active{background:var(--gold);color:#fff;border-color:var(--gold)}
.app.pure-mode .header-banner{display:none}
.app.pure-mode .sidebar{display:none}
.app.pure-mode .content{display:none}
.app.pure-mode .pure-btn{background:var(--gold);color:#fff;border-color:var(--gold)}
.app.pure-mode .menu-btn{display:none}
.app.pure-mode .overlay-mask{display:none!important}

let totalChapters=32;

let isEditMode=false,currentChapter=null,chapterData={};

function loadData(){
  const s=localStorage.getItem('skb7_data');if(s){try{chapterData=JSON.parse(s)}catch{chapterData={}}}
  updateStats()}
function saveData(){localStorage.setItem('skb7_data',JSON.stringify(chapterData));updateStats();showToast('已保存');if(githubToken)saveToCloud(true)}
let at;function autoSave(){clearTimeout(at);at=setTimeout(()=>{localStorage.setItem('skb7_data',JSON.stringify(chapterData));updateStats()},600)}function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function updateStats(){
  let f=0,w=0;
  for(const d of Object.values(chapterData)){const t=[d.knowledge,d.competency,d.mistakes,d.kax,d.lessonPlan,d.homework].filter(Boolean).join('');if(t.length>10)f++;w+=t.length}
  document.getElementById('stats-filled').textContent=f;
  document.getElementById('stats-words').textContent=Math.round(w/1000);
  document.getElementById('progPct').textContent=Math.round(f/totalChapters*100)+'%';
  document.getElementById('progFill').style.width=Math.round(f/totalChapters*100)+'%';
}

function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlayMask').classList.add('show')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlayMask').classList.remove('show')}

// 侧边栏触屏拖动
(function(){
  var sb,ox,oy,dx,dragging=false,touchStarted=false;
  document.addEventListener('touchstart',function(e){
    sb=document.getElementById('sidebar');
    if(!sb||!sb.classList.contains('open'))return;
    var t=e.touches[0];
    ox=t.clientX;oy=t.clientY;
    // 只在左边缘30px内开始拖动
    if(ox>60)return;
    touchStarted=true;dragging=false;
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!touchStarted)return;
    var t=e.touches[0];dx=t.clientX-ox;
    if(Math.abs(dx)>8)dragging=true;
    if(dragging&&dx<-20)closeSidebar();
  },{passive:true});
  document.addEventListener('touchend',function(){touchStarted=false;dragging=false});
})();

function toggleEditMode(){
  if(isEditMode){
    isEditMode=false;
    /* 退出前强制把当前编辑器内容刷进 chapterData */
    document.querySelectorAll('.editor-area').forEach(el=>{
      const f=el.dataset.field, chId=el.dataset.chid||currentChapter;
      if(f&&chId) autoSaveCh(chId,f,el.innerHTML);
    });
    localStorage.setItem('skb7_data',JSON.stringify(chapterData));
    document.getElementById('modeBadge').className='mode-tag view';
    document.getElementById('modeBadge').textContent='只读';
    document.getElementById('btnEditToggle').textContent='开启编辑';
    document.getElementById('btnSave').style.display='none';
    if(currentChapter) renderContent(currentChapter);

    document.getElementById('pwdOverlay').classList.remove('hidden');
    document.getElementById('pwdInput').value='';

  }
}

function getGrade(id){if(id.startsWith('7a'))return'七上';if(id.startsWith('7b'))return'七下';if(id.startsWith('8a'))return'八上';if(id.startsWith('8b'))return'八下';if(id.startsWith('9a'))return'九上';if(id.startsWith('9b'))return'九下';return'九上'}

// 设置背景图
// 根据章节ID获取对应的背景图key
function getChapterBgKey(chId){
  const grade=getGrade(chId);
  const gradePrefix={'七上':'7a','七下':'7b','八上':'8a','八下':'8b','九上':'9a','九下':'9b'}[grade];
  // 算出该章节在年级内的序号(1-based)
  const chapters=textbook[grade].chapters;
  const idx=chapters.findIndex(c=>c.id===chId)+1;
  return 'bg_'+gradePrefix+'_'+idx;
}

function setChapterBg(chId){
  const bgKey=getChapterBgKey(chId);
  const bgLayer=document.getElementById('bgLayer');
  if(IMG_DATA[bgKey]){
    bgLayer.style.backgroundImage='url('+IMG_DATA[bgKey]+')';
  }
}

// 设置页眉（img标签完整展示）
function setHeader(){
  const hb=document.getElementById('headerBanner');
  if(IMG_DATA['header']){
    const img=document.createElement('img');
    img.src=IMG_DATA['header'];
    img.alt='';img.className='header-full-img';
    img.loading='eager';
    // 插入到header-inner之前作为背景图
    hb.insertBefore(img, hb.firstChild);
  }
}

// 富文本编辑器相关
function autoSaveCh(id,f,val){if(!chapterData[id])chapterData[id]={};chapterData[id][f]=val;autoSave()}
function onEditorInput(el,f,id){autoSaveCh(id,f,el.innerHTML)}
function execCmd(cmd,btn){document.execCommand(cmd,false,null);if(btn)setTimeout(()=>btn.classList.toggle('active',document.queryCommandState(cmd)),10)}
function execCmdVal(cmd,val,btn){document.execCommand(cmd,false,val)}
function doFontSize(size,f){
  const el=document.querySelector('.editor-area[data-field="'+f+'"]');
  if(!el)return;
  restoreSelection();
  el.focus();
  document.execCommand('fontSize',false,size);
}
function doForeColor(color,f){
  const el=document.querySelector('.editor-area[data-field="'+f+'"]');
  if(!el)return;
  restoreSelection();
  el.focus();
  document.execCommand('foreColor',false,color);
}
function insertLink(f){const url=prompt('输入链接地址：','https://');if(!url)return;document.execCommand('createLink',false,url)}
function insertImgToEditor(chId,f,btn){
  const input=document.createElement('input');input.type='file';input.accept='image/*';
  input.onchange=function(){const file=this.files[0];if(!file)return;compressImgToEditor(file,chId,f)};
  input.click();
}
function compressImgToEditor(file,chId,f){
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      let w=img.width,h=img.height;
      if(w>600){h=Math.round(h*600/w);w=600}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl=c.toDataURL('image/jpeg',0.72);
      const el=document.querySelector('.editor-area[data-field="'+f+'"]');
      if(el){el.focus();document.execCommand('insertImage',false,dataUrl);onEditorInput(el,f,chId)}
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function onEditorPaste(e,el,chId,f){
  const items=e.clipboardData.items;
  for(let i=0;i<items.length;i++){
    if(items[i].type.indexOf('image')!==-1){
      e.preventDefault();
      const file=items[i].getAsFile();
      compressImgToEditor(file,chId,f);
      return;
    }
  }
  setTimeout(()=>onEditorInput(el,f,chId),50);
}
function bindEditorDrop(){
  document.querySelectorAll('.editor-area').forEach(el=>{
    el.addEventListener('dragover',function(e){e.preventDefault();this.style.borderColor='var(--gold)';this.style.background='rgba(200,160,60,0.08)'});
    el.addEventListener('dragleave',function(e){e.preventDefault();this.style.borderColor='';this.style.background=''});
    el.addEventListener('drop',function(e){
      e.preventDefault();this.style.borderColor='';this.style.background='';
      const files=e.dataTransfer.files;
      if(files.length>0&&files[0].type.startsWith('image/')){
        const f=this.dataset.field,id=currentChapter?id:'';
        compressImgToEditor(files[0],id,f)
      }
    })
  });
}
// 标签插入（富文本版）
function insTagToEditor(id,f,text){
  const el=document.querySelector('.editor-area[data-field="'+f+'"]');
  if(!el)return;
  el.focus();
  document.execCommand('insertText',false,text);
  onEditorInput(el,f,id);
}
// 公式插入
function insLT(id,code){
  const el=document.querySelector('#mainContent .editor-area');
  if(!el)return;
  el.focus();
  document.execCommand('insertText',false,code);
  const f=el.dataset.field;
  onEditorInput(el,f,id);
}
// 图片压缩通用
function compressImg(file,maxW,quality,cb){
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',quality));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
// 图片素材区上传（压缩）
function uploadImg(id,input){
  const file=input.files[0];if(!file)return;
  compressImg(file,400,0.65,function(dataUrl){
    if(!chapterData[id])chapterData[id]={};
    if(!chapterData[id].images)chapterData[id].images=[];
    chapterData[id].images.push(dataUrl);
    autoSave();renderContent(currentChapter);showToast('已上传');
  });
  input.value='';
}
// 章节配图上传（压缩）
function uploadFooterImg(chId,input){
  const file=input.files[0];if(!file)return;
  compressImg(file,900,0.78,function(dataUrl){
    if(!chapterData[chId])chapterData[chId]={};
    if(!chapterData[chId].footerImgs)chapterData[chId].footerImgs=[];
    chapterData[chId].footerImgs.push(dataUrl);
    autoSave();renderContent(currentChapter);showToast('配图已添加');
  });
  input.value='';
}
function delFooterImg(chId,idx){
  if(chapterData[chId]&&chapterData[chId].footerImgs){
    chapterData[chId].footerImgs.splice(idx,1);
    autoSave();renderContent(currentChapter);showToast('已删除');
  }
}


// ====== GitHub 云端同步 ======
let githubToken='';
let savedSelection=null; // 保存编辑器选区
function setGithubToken(){
  const t=prompt('输入GitHub Personal Access Token（repo权限）：',(githubToken||''));
  if(t!==null){githubToken=t;localStorage.setItem('skb_github_token',t);showToast('Token已保存')}
}
function loadGithubToken(){githubToken=localStorage.getItem('skb_github_token')||''}
function saveToCloud(silent){
  if(!githubToken){if(!silent)setGithubToken();if(!githubToken)return}
  // 备课数据
  const data=JSON.stringify(chapterData,null,2);
  const content=btoa(unescape(encodeURIComponent(data)));
  const sha=window._cloudSha||'';
  const body={message:'auto: 备份备课数据 '+new Date().toISOString().slice(0,10)+' '+new Date().toTimeString().slice(0,5),content:content};
  if(sha)body.sha=sha;
  fetch('https://api.github.com/repos/anankax/skb-math/contents/data.json',{method:'PUT',headers:{Authorization:'token '+githubToken,'Accept':'application/vnd.github.v3+json'},body:JSON.stringify(body)})
    .then(r=>{if(!r.ok)return r.json().then(e=>{throw new Error(e.message||'保存失败')});return r.json()})
    .then(j=>{window._cloudSha=j.sha;if(!silent)showToast('✅ 已推送到云端')})
    .catch(e=>{if(!silent)showToast('❌ 推送失败: '+e.message)});
  // 日记数据
  const diaryContent=btoa(unescape(encodeURIComponent(JSON.stringify(diaryData,null,2))));
  const diarySha=window._diaryCloudSha||'';
  const diaryBody={message:'auto: 备份日记数据 '+new Date().toISOString().slice(0,10),content:diaryContent};
  if(diarySha)diaryBody.sha=diarySha;
  fetch('https://api.github.com/repos/anankax/skb-math/contents/diary.json',{method:'PUT',headers:{Authorization:'token '+githubToken,'Accept':'application/vnd.github.v3+json'},body:JSON.stringify(diaryBody)})
    .then(r=>{if(!r.ok)return r.json().then(e=>{throw new Error(e.message||'日记保存失败')});return r.json()})
    .then(j=>{window._diaryCloudSha=j.sha;console.log('[sync] 日记已推送')})
    .catch(e=>{console.log('[sync] 日记推送失败:',e.message)});
}
function loadFromCloud(silent){
  if(!silent) showToast('⏳ 正在拉取...');
  const headers = githubToken
    ? {'Authorization':'token '+githubToken,'Accept':'application/vnd.github.v3+json'}
    : {'Accept':'application/vnd.github.v3+json'};
  // 拉取备课数据
  fetch('https://api.github.com/repos/anankax/skb-math/contents/data.json', {headers})
    .then(r=>{
      if(r.status===404){if(!silent) showToast('云端暂无数据');return null}
      if(!r.ok) throw new Error('拉取失败')
      return r.json()
    })
    .then(j=>{
      if(!j) return;
      window._cloudSha = j.sha;
      const data = decodeURIComponent(escape(atob(j.content)));
      chapterData = JSON.parse(data);
      localStorage.setItem('skb7_data', JSON.stringify(chapterData));
      updateStats();
      if(currentChapter) renderContent(currentChapter);
      if(!silent) showToast('✅ 已从云端拉取');
      else console.log('[sync] 云端数据已同步');
    })
    .catch(e=>{if(!silent) showToast('❌ 拉取失败: '+e.message)});
  // 拉取日记数据
  fetch('https://api.github.com/repos/anankax/skb-math/contents/diary.json', {headers})
    .then(r=>{
      if(r.status===404) return null;
      if(!r.ok) throw new Error('日记拉取失败');
      return r.json()
    })
    .then(j=>{
      if(!j) return;
      window._diaryCloudSha = j.sha;
      diaryData = JSON.parse(decodeURIComponent(escape(atob(j.content))));
      localStorage.setItem('skb7_diary', JSON.stringify(diaryData));
      renderDiaryList();
      console.log('[sync] 日记已同步');
    })
    .catch(e=>{console.log('[sync] 日记拉取失败:',e.message)});
}

// ====== 日记模块 ======
let diaryData=[]; // [{id, date, title, content}]
let currentDiaryId=null;
function loadDiaryData(){
  const s=localStorage.getItem('skb7_diary');
  if(s){try{diaryData=JSON.parse(s)}catch{diaryData=[]}}
}
function saveDiaryData(){localStorage.setItem('skb7_diary',JSON.stringify(diaryData))}
function toggleDiaryBody(){
  const body=document.getElementById('diaryBody');
  const arrow=document.getElementById('diaryArrow');
  body.classList.toggle('collapsed');
  arrow.classList.toggle('open');
}
function renderDiaryList(){
  const list=document.getElementById('diaryList');
  list.innerHTML='';
  if(diaryData.length===0){list.innerHTML='<div class="diary-empty">还没有日记，开始写一篇吧 ✨</div>';return}
  diaryData.forEach(d=>{
    const el=document.createElement('div');
    el.className='diary-entry'+(d.id===currentDiaryId?' active':'');
    el.innerHTML='<span class="de-date">'+(d.date||'')+'</span><span class="de-title">'+(d.title||'无标题')+'</span>';
    el.onclick=()=>selectDiaryEntry(d.id);
    list.appendChild(el);
  });
}
function genDiaryId(){return 'd_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)}
function addDiaryEntry(){
  const now=new Date();
  const dateStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  const entry={id:genDiaryId(),date:dateStr,title:dateStr+' 日记',content:''};
  diaryData.unshift(entry);
  saveDiaryData();
  renderDiaryList();
  selectDiaryEntry(entry.id);
  showToast('新日记已创建');
}
function getDiaryById(id){return diaryData.find(d=>d.id===id)}
function selectDiaryEntry(id){
  currentDiaryId=id;
  document.querySelectorAll('.diary-entry').forEach(e=>e.classList.remove('active'));
  const entry=getDiaryById(id);
  if(!entry)return;
  // highlight in list
  Array.from(document.querySelectorAll('.diary-entry')).find(e=>{
    const d=getDiaryById(id);return e.textContent.includes(d.date);
  })?.classList.add('active');
  renderDiaryContent(entry);
  // update toolbar title
  document.getElementById('currentTitle').textContent='📔 '+entry.title;
}
function deleteDiaryEntry(id){
  if(!confirm('确定删除这篇日记吗？'))return;
  diaryData=diaryData.filter(d=>d.id!==id);
  saveDiaryData();
  renderDiaryList();
  if(currentDiaryId===id){currentDiaryId=null;showMainEmpty()}
  showToast('日记已删除');
}
function showMainEmpty(){
  document.getElementById('mainContent').innerHTML='<div class="empty-state"><div class="emblem">📔</div><h4>学习日记</h4><p>记录学习心得 · 整理错题反思<br>写下来，记得更牢 📝</p></div>';
  document.getElementById('currentTitle').textContent='选择章节或日记开始';
}
function renderDiaryContent(entry){
  const main=document.getElementById('mainContent'),ed=isEditMode;
  let html='';
  html+='<div class="diary-content-header">';
  html+='<h3>📔 '+entry.title+'</h3>';
  if(ed)html+="<input type=\"text\" class=\"diary-date-input\" value=\""+entry.date+"\" placeholder=\"日期\" onchange=\"updateDiaryField('"+entry.id+"','date',this.value)\">";
  else html+='<span style="color:var(--text-dim);font-size:12.5px">'+entry.date+'</span>';
  html+='</div>';

  html+='<div class="diary-card">';
  if(ed){
    html+='<div class="diary-editor-toolbar">';
    html+='<button onclick="execCmd(\'bold\',this)" title="粗体"><b>B</b></button>';
    html+='<button onclick="execCmd(\'italic\',this)" title="斜体"><i>I</i></button>';
    html+='<button onclick="execCmd(\'underline\',this)" title="下划线"><u>U</u></button>';
    html+='<span class="tb-sep"></span>';
    html+='<button onclick="execCmd(\'insertUnorderedList\',this)" title="列表">• 列表</button>';
    html+='<span class="tb-sep"></span>';
    html+='<button onclick="insertLinkDiary()" title="链接">🔗 链接</button>';
    html+='<button onclick="insertImgDiary(\''+entry.id+'\')" title="图片">🖼 图片</button>';
    html+='<span class="tb-sep"></span>';
    html+='<button onclick="execCmdVal(\'formatBlock\',\'h3\',this)" title="标题">H3</button>';
    html+='<button onclick="execCmdVal(\'formatBlock\',\'p\',this)" title="正文">P</button>';
    html+='</div>';
    html+='<div class="diary-editor-area" contenteditable="true" id="diaryEditorArea" oninput="onDiaryEditorInput(\''+entry.id+'\')" onpaste="onDiaryPaste(event,\''+entry.id+'\')">'+(entry.content||'')+'</div>';
  }else{
    html+='<div class="diary-readonly">'+(entry.content||'')+'</div>';
  }
  html+='</div>';

  html+='<div class="diary-action-bar">';
  if(ed){
    html+='<button onclick="saveCurrentDiary()" style="background:linear-gradient(135deg,#f5e6c3,#e8d4a0);color:var(--gold-dark);border-color:var(--gold);font-weight:700">💾 保存日记</button>';
  }
  html+='<button class="btn-del" onclick="deleteDiaryEntry(\''+entry.id+'\')">🗑 删除此篇</button>';
  html+='<button onclick="goHome()" class="btn-gold" style="margin-left:auto">← 返回首页</button>';
  html+='</div>';

  main.innerHTML=html;
  if(!ed)setTimeout(()=>{if(window.MathJax)MathJax.typesetPromise([main])},100);
  else setTimeout(bindDiaryDrop,50);
}
function onDiaryEditorInput(id){
  const el=document.getElementById('diaryEditorArea');
  if(!el)return;
  const entry=getDiaryById(id);
  if(entry){entry.content=el.innerHTML;autoSave()}
}
function onDiaryPaste(e,id){
  const items=e.clipboardData.items;
  for(let i=0;i<items.length;i++){
    if(items[i].type.indexOf('image')!==-1){
      e.preventDefault();const file=items[i].getAsFile();compressImgToDiary(file,id);return}
  }
  setTimeout(()=>onDiaryEditorInput(id),50);
}
function insertLinkDiary(){const url=prompt('输入链接地址：','https://');if(url)document.execCommand('createLink',false,url)}
function insertImgDiary(diaryId){
  const input=document.createElement('input');input.type='file';input.accept='image/*';
  input.onchange=function(){const f=this.files[0];if(f)compressImgToDiary(f,diaryId)};
  input.click();
}
function compressImgToDiary(file,diaryId){
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      let w=img.width,h=img.height;if(w>800){h=Math.round(h*800/w);w=800}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl=c.toDataURL('image/jpeg',0.78);
      const el=document.getElementById('diaryEditorArea');
      if(el){el.focus();document.execCommand('insertImage',false,dataUrl);onDiaryEditorInput(diaryId)}
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function bindDiaryDrop(){
  const el=document.getElementById('diaryEditorArea');if(!el)return;
  el.addEventListener('dragover',function(e){e.preventDefault();this.style.borderColor='var(--gold)'});
  el.addEventListener('dragleave',function(e){e.preventDefault();this.style.borderColor=''});
  el.addEventListener('drop',function(e){
    e.preventDefault();this.style.borderColor='';
    const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))compressImgToDiary(f,currentDiaryId)
  });
}
function saveCurrentDiary(){
  const el=document.getElementById('diaryEditorArea');
  if(!el||!currentDiaryId)return;
  const entry=getDiaryById(currentDiaryId);
  if(entry){entry.content=el.innerHTML;saveDiaryData();renderDiaryList();showToast('💾 日记已保存')}
}
function updateDiaryField(id,field,val){
  const entry=getDiaryById(id);
  if(entry){entry[field]=val;saveDiaryData();renderDiaryList()}
}

  isPureMode=!isPureMode;
  const app=document.getElementById('appContainer');
  const bg=document.getElementById('bgLayer');
  const btn=document.getElementById('pureBtn');
  if(isPureMode){
    app.classList.add('pure-mode');
    bg.classList.add('pure');
    btn.classList.add('active');

  }else{
    app.classList.remove('pure-mode');
    bg.classList.remove('pure');
    btn.classList.remove('active');
    btn.title='纯净欣赏背景';
  }
}
