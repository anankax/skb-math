<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAX · 数学空间</title>
<script>MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']],displayMath:[['$$','$$'],['\\[','\\]']]},svg:{fontCache:'global'}};</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<!-- DOMPurify: XSS 防护 -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<!-- 首页 -->
<div class="home-page" id="homePage">
  <div class="home-bg"><img id="homeBgImg" src="images/home_bg.jpg" alt=""></div>
  <div class="home-content">
    <div class="title-zone">
      <img src="images/title_logo.png" alt="初中数学" class="home-title-img">
      <div class="sub">— crafted by kax —</div>
      <button class="enter-btn" onclick="SKB.ui.enterSite()">数学，启动！</button>
    </div>
  </div>
</div>

<!-- 背景图层 -->
<div class="bg-layer" id="bgLayer" style="display:none"></div>

<!-- 纯净欣赏背景按钮 -->
<button class="pure-btn" id="pureBtn" style="display:none" onclick="SKB.ui.togglePureMode()" title="纯净欣赏背景">🖼</button>

<!-- 页眉横幅 -->
<div class="header-banner" id="headerBanner" style="display:none">
    <div class="header-inner">
      <div class="author-mark">— crafted by <em>kax</em> —</div>
    </div>
</div>

<div class="overlay-mask" id="overlayMask" onclick="SKB.ui.closeSidebar()"></div>
<button class="menu-btn" onclick="SKB.ui.openSidebar()"><span></span></button>

<div class="app" id="appContainer" style="display:none">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <button class="sidebar-close-btn" onclick="SKB.ui.closeSidebar()">✕</button>
    <div class="sidebar-header">
      <img src="images/title_logo.png" alt="初中数学" class="sidebar-title-img">
      <h2>内容索引</h2>
      <div class="sub">苏科版 · 32章</div>
    </div>
    <div class="sidebar-stats">
      <span>共 <b id="stats-filled">0</b> 篇</span>
      <span>约 <b id="stats-words">0</b>千字</span>
    </div>
    <input class="search-box" id="searchBox" placeholder="搜索内容…" oninput="SKB.render.filterChapters()">
    <div class="nav" id="chapterNav"></div>

    <!-- 日记模块 -->
    <div class="diary-section" id="diarySection">
      <div class="diary-title" onclick="SKB.diary.toggleBody()">
        <img src="images/el_ice.webp" class="el-icon" alt=""> 随笔
        <span class="gd-arrow open" id="diaryArrow">▶</span>
      </div>
      <div class="diary-body" id="diaryBody">
        <div class="diary-list" id="diaryList"></div>
        <div class="diary-add-btn" onclick="SKB.diary.add()">＋ 写随笔</div>
      </div>
    </div>

    <div class="progress-bar">
      <div class="prog-label"><span>内容覆盖</span><span id="progPct">0%</span></div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="toolbar">
      <h3 id="currentTitle">欢迎 👋</h3>
      <span class="mode-tag view" id="modeBadge">只读</span>
      <button onclick="SKB.ui.toggleEditMode()" id="btnEditToggle">开启编辑</button>
      <button onclick="SKB.saveData()" id="btnSave" style="display:none">保存</button>
      <button onclick="SKB.ui.goHome()" class="btn-gold" id="btnHome" title="返回首页">🏠</button>
      <button onclick="SKB.setGithubToken()" title="云端同步设置" style="font-size:10px;opacity:0.7">☁️</button>
    </div>
    <div class="content" id="mainContent">
      <div class="empty-state">
        <div class="emblem">✦</div>
        <h4>KAX 的数学空间</h4>
        <p>左侧浏览苏科版 32 章教学笔记<br>知识要点 · 核心素养 · 易错清单 · 真题精选 · 备课笔记 · 作业设计<br><br>📔 侧栏底部「随笔」记录日常所思</p>
      </div>
    </div>
  </div>
</div>

<!-- 密码验证 -->
<div class="pwd-overlay hidden" id="pwdOverlay">
  <div class="pwd-box">
    <h4>输入编辑密码</h4>
    <input type="password" id="pwdInput" onkeydown="if(event.key==='Enter')SKB.ui.checkPwd()">
    <div class="pwd-btns"><button class="btn-ok" onclick="SKB.ui.checkPwd()">确认</button><button class="btn-cancel" onclick="document.getElementById('pwdOverlay').classList.add('hidden')">取消</button></div>
  </div>
</div>

<!-- 灯箱 -->
<div class="lightbox" id="lightbox"><img id="lightboxImg"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- JS 模块（按依赖顺序加载） -->
<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/editor.js"></script>
<script src="js/render.js"></script>
<script src="js/diary.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
