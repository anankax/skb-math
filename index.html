<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初中数学 · 苏科版</title>
<script>MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']],displayMath:[['$$','$$'],['\\[','\\]']]},svg:{fontCache:'global'}};</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap');
:root{
  --ivory:#faf7f0;--ivory-dark:#f0ebe0;--card-bg:rgba(255,252,247,0.95);--card-bg2:rgba(253,250,245,0.96);
  --gold:#c9a96e;--gold-light:#e0cd9f;--gold-dark:#8b6914;--gold-glow:rgba(201,169,110,0.2);
  --gold-border:rgba(180,150,100,0.3);--text-pri:#4a3f35;--text-sec:#7a7065;--text-dim:#a09888;--text-head:#3d3028;
  --shadow-sm:0 1px 3px rgba(100,80,50,0.06);--shadow-md:0 3px 12px rgba(100,80,50,0.08);
  --radius:10px;--side-w:280px;
  --c1:#5b9bd5;--c1-bg:rgba(91,155,213,0.05);--c1-glow:rgba(91,155,213,0.08);
  --c2:#c9a96e;--c2-bg:rgba(201,169,110,0.05);--c2-glow:rgba(201,169,110,0.08);
  --c3:#9b7fd4;--c3-bg:rgba(155,127,212,0.05);--c3-glow:rgba(155,127,212,0.08);
  --c4:#6daa6f;--c4-bg:rgba(109,170,111,0.04);--c4-glow:rgba(109,170,111,0.07);
  --c5:#5babc4;--c5-bg:rgba(91,171,196,0.05);--c5-glow:rgba(91,171,196,0.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Noto Serif SC","Microsoft YaHei","微软雅黑",serif;
  color:var(--text-pri);min-height:100vh;overflow-x:hidden;
  background:var(--ivory);position:relative;
}

/* ====== 背景图层 ====== */
.bg-layer{
  position:fixed;inset:0;z-index:-1;
  background-size:cover;background-position:center;background-repeat:no-repeat;
  opacity:0.16;filter:blur(1px);
  transition:background-image 1.5s ease;
}
.bg-layer::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 40%,rgba(250,247,240,0.35) 0%,rgba(250,247,240,0.75) 70%,rgba(250,247,240,0.92) 100%);
}

/* ====== 浮动角色装饰 ====== */
.float-decor{
  position:fixed;z-index:0;pointer-events:none;
  opacity:0.22;
  transition:opacity 0.8s;
}
.float-decor img{width:100%;height:100%;object-fit:contain;border-radius:8px;}
.float-decor.d1{bottom:30px;right:15px;width:160px;height:240px}
.float-decor.d2{top:200px;left:290px;width:130px;height:200px;opacity:0.15}

/* ====== 汉堡菜单 ====== */
.menu-btn{display:none;position:fixed;top:12px;left:12px;z-index:101;width:44px;height:44px;border:1px solid var(--gold-border);border-radius:8px;background:var(--card-bg);cursor:pointer;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
.menu-btn span{display:block;width:20px;height:2px;background:var(--gold-dark);position:relative;transition:.3s}
.menu-btn span::before,.menu-btn span::after{content:'';display:block;width:20px;height:2px;background:var(--gold-dark);position:absolute;transition:.3s}
.menu-btn span::before{top:-6px}.menu-btn span::after{top:6px}
.overlay-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;backdrop-filter:blur(2px)}
.overlay-mask.show{display:block}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--ivory-dark)}::-webkit-scrollbar-thumb{background:var(--gold-border);border-radius:3px}

.app{display:flex;min-height:100vh}

/* ====== 页眉横幅 - 完整显示图片 ====== */
.header-banner{
  position:relative;width:100%;
  overflow:hidden;
  flex-shrink:0;display:flex;align-items:flex-end;padding:0 28px 14px;
  background-size:cover;background-position:center top;
  border-bottom:2px solid var(--gold-light);
  min-height:320px;
}
/* 用padding-top撑出空间让页眉图顶部可见 */
.header-banner::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(180deg,
    rgba(250,247,240,0.15) 0%,
    rgba(250,247,240,0.45) 50%,
    rgba(250,247,240,0.85) 80%,
    rgba(250,247,240,0.97) 100%);
}
.header-banner .header-inner{position:relative;z-index:2;padding-top:180px}
.header-banner h1{font-size:22px;color:var(--gold-dark);letter-spacing:2px;font-weight:700}
.header-banner .sub{position:relative;z-index:2;font-size:12px;color:var(--text-sec);margin-top:2px;letter-spacing:1px}

/* ====== SIDEBAR ====== */
.sidebar{width:var(--side-w);background:rgba(255,253,248,0.93);border-right:1px solid var(--gold-border);display:flex;flex-direction:column;flex-shrink:0;position:relative;z-index:10;box-shadow:2px 0 16px rgba(100,80,40,.04);backdrop-filter:blur(8px)}
.sidebar-header{padding:18px 16px 12px;border-bottom:1px solid var(--gold-border);position:relative}
.sidebar-header::after{content:'';position:absolute;bottom:0;left:16px;right:16px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-light),transparent)}
.sidebar-header h2{font-size:17px;color:var(--gold-dark);font-weight:700;letter-spacing:1px}
.sidebar-header .sub{font-size:11px;color:var(--text-dim);margin-top:2px}
.sidebar-stats{padding:6px 16px;font-size:11px;color:var(--text-sec);border-bottom:1px solid rgba(180,150,100,.12);display:flex;justify-content:space-between}
.search-box{margin:6px 12px;padding:7px 12px;border:1px solid var(--gold-border);border-radius:18px;font-size:13px;font-family:inherit;color:var(--text-pri);background:var(--card-bg);outline:none;transition:.3s}
.search-box:focus{border-color:var(--gold);box-shadow:0 0 10px var(--gold-glow)}
.search-box::placeholder{color:var(--text-dim)}
.nav{flex:1;overflow-y:auto;padding:4px 0}

.grade-title{padding:10px 16px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;border-left:3px solid transparent;transition:.25s;color:var(--text-sec);letter-spacing:1px}
.grade-title:hover{background:rgba(200,160,100,.04)}
.grade-title .gd-arrow{margin-left:auto;font-size:9px;transition:.3s;color:var(--gold)}
.grade-title .gd-arrow.open{transform:rotate(90deg)}
.grade-chapters.collapsed{display:none}

.chapter-item{padding:7px 16px 7px 30px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;border-left:2px solid transparent;transition:.2s;color:var(--text-sec);position:relative}
.chapter-item:hover{background:rgba(200,160,100,.04);color:var(--text-head)}
.chapter-item .ch-num{font-size:10px;color:var(--text-dim);min-width:22px}
.chapter-item .badge{font-size:9px;color:#fff;padding:1px 7px;border-radius:8px;margin-left:auto}
.chapter-item .el-dot{width:7px;height:7px;border-radius:2px;transform:rotate(45deg);flex-shrink:0;margin-right:2px}
.chapter-item.active{font-weight:600}

.grade-title.g-1{border-left-color:transparent;background:var(--c1-bg);color:var(--c1)}
.grade-title.g-2{border-left-color:transparent;background:var(--c2-bg);color:var(--c2)}
.grade-title.g-3{border-left-color:transparent;background:var(--c3-bg);color:var(--c3)}
.grade-title.g-4{border-left-color:transparent;background:var(--c4-bg);color:var(--c4)}
.grade-title.g-5{border-left-color:transparent;background:var(--c5-bg);color:var(--c5)}

.ch-item-1.active{background:linear-gradient(90deg,var(--c1-bg),transparent);color:var(--c1);border-left-color:var(--c1)}
.ch-item-2.active{background:linear-gradient(90deg,var(--c2-bg),transparent);color:var(--c2);border-left-color:var(--c2)}
.ch-item-3.active{background:linear-gradient(90deg,var(--c3-bg),transparent);color:var(--c3);border-left-color:var(--c3)}
.ch-item-4.active{background:linear-gradient(90deg,var(--c4-bg),transparent);color:var(--c4);border-left-color:var(--c4)}
.ch-item-5.active{background:linear-gradient(90deg,var(--c5-bg),transparent);color:var(--c5);border-left-color:var(--c5)}

.sidebar-close-btn{position:absolute;top:10px;right:10px;width:32px;height:32px;border:1px solid var(--gold-border);border-radius:50%;background:var(--card-bg);cursor:pointer;font-size:14px;color:var(--text-dim);line-height:30px;text-align:center;z-index:5;display:none}

/* ====== MAIN ====== */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}

.toolbar{padding:10px 20px;background:var(--card-bg);border-bottom:1px solid var(--gold-border);display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;box-shadow:var(--shadow-sm);position:sticky;top:0;z-index:5;backdrop-filter:blur(6px)}
.toolbar h3{font-size:15px;color:var(--text-head);flex:1;min-width:140px;font-weight:600}
.toolbar .mode-tag{font-size:10px;padding:3px 10px;border-radius:10px;border:1px solid var(--gold-border)}
.mode-tag.view{color:var(--text-dim)}.mode-tag.edit{color:var(--gold-dark);border-color:var(--gold);background:var(--gold-glow)}
.toolbar button{padding:5px 12px;border:1px solid var(--gold-border);border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;background:var(--card-bg);color:var(--text-sec);transition:.25s;white-space:nowrap}
.toolbar button:hover{border-color:var(--gold);color:var(--gold-dark);background:rgba(200,160,100,.05)}
.toolbar .btn-gold{background:linear-gradient(135deg,#f5ead5,#ead9b0);color:var(--gold-dark);border-color:var(--gold);font-weight:600}

/* 内容区 - 增加留白 */
.content{flex:1;overflow-y:auto;padding:28px 36px;display:flex;flex-direction:column;gap:18px;position:relative;z-index:2;max-width:1200px;margin:0 auto;width:100%}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-dim);gap:14px;text-align:center;padding:60px 20px}
.empty-state .emblem{width:80px;height:80px;border:2px solid var(--gold-border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;background:rgba(200,160,100,.03)}
.empty-state h4{color:var(--text-sec);font-weight:500}
.empty-state p{font-size:13px;line-height:2}

/* chapter meta */
.chapter-meta{display:flex;gap:14px;flex-wrap:wrap;align-items:center;padding:14px 18px;background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--gold-border);font-size:12px;box-shadow:var(--shadow-sm);backdrop-filter:blur(4px);position:relative;z-index:3}
.chapter-meta .meta-item{color:var(--text-sec)}.chapter-meta .meta-item b{color:var(--text-head)}

/* ====== 章节底部大图 ====== */
.chapter-footer-img{
  margin:0;padding:0;
  border-radius:var(--radius);overflow:hidden;
  border:1px solid var(--gold-border);
  box-shadow:var(--shadow-md);
}
.chapter-footer-img img{
  width:100%;height:auto;object-fit:cover;
  display:block;border-radius:8px;
  transition:.3s ease;cursor:pointer;
}
.chapter-footer-img img:hover{opacity:0.92}

/* cards */
.section-card{background:var(--card-bg);border-radius:var(--radius);overflow:hidden;border:1px solid var(--gold-border);box-shadow:var(--shadow-sm);transition:.3s;backdrop-filter:blur(4px);position:relative;z-index:3}
.section-card:hover{box-shadow:var(--shadow-md);border-color:rgba(200,160,100,.22)}
.section-card::before{content:'';display:block;height:1px;background:linear-gradient(90deg,transparent,var(--gold-light),transparent);opacity:.5}
.card-hd{padding:12px 18px;display:flex;align-items:center;gap:8px;cursor:pointer;background:rgba(245,239,224,.25)}
.card-hd .hd-icon{font-size:16px;width:24px;text-align:center;flex-shrink:0}
.card-hd .hd-title{font-size:13px;font-weight:600;color:var(--text-head);flex:1}
.card-hd .hd-tag{font-size:10px;padding:2px 8px;border-radius:8px;border:1px solid;flex-shrink:0}
.card-hd .hd-toggle{margin-left:auto;color:var(--text-dim);font-size:10px;transition:.3s}
.card-hd .hd-toggle.collapsed{transform:rotate(-90deg)}
.card-bd{padding:16px 18px}.card-bd.collapsed{display:none}

.card-bd textarea{width:100%;border:1px solid var(--gold-border);border-radius:6px;padding:12px;font-size:13px;font-family:inherit;color:var(--text-pri);background:rgba(250,247,240,.75);resize:vertical;min-height:100px;line-height:1.8;transition:.3s}
.card-bd textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 10px var(--gold-glow)}
.card-bd textarea::placeholder{color:var(--text-dim)}
.readonly-render{font-size:13px;line-height:2;color:var(--text-pri);min-height:18px}
.readonly-render:empty::after{content:'（暂无内容）';color:var(--text-dim);font-style:italic}
.readonly-render img{max-width:100%;border-radius:4px;margin:6px 0;border:1px solid var(--gold-border)}

.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tag-row .kw{font-size:10px;padding:3px 10px;border-radius:12px;border:1px solid var(--gold-border);color:var(--text-sec);cursor:pointer;transition:.2s;background:rgba(250,247,240,.6)}
.tag-row .kw:hover{border-color:var(--gold);color:var(--gold-dark);background:rgba(200,160,100,.05)}

.upload-zone{border:1px dashed var(--gold-border);border-radius:6px;padding:14px;text-align:center;cursor:pointer;margin-top:8px;transition:.3s;background:rgba(250,247,240,.5)}
.upload-zone:hover{border-color:var(--gold)}.upload-zone input{display:none}
.upload-zone .hint{color:var(--text-dim);font-size:12px}
.img-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.img-row .thumb{width:70px;height:70px;object-fit:cover;border-radius:4px;border:1px solid var(--gold-border);cursor:pointer;transition:.2s}
.img-row .thumb:hover{border-color:var(--gold);transform:scale(1.05)}

.math-bar{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0;padding:6px 10px;background:rgba(250,247,240,.6);border-radius:6px;border:1px solid rgba(180,150,100,.12)}
.math-bar button{padding:3px 7px;border:1px solid var(--gold-border);border-radius:4px;background:var(--card-bg);color:var(--text-sec);cursor:pointer;font-size:10px;font-family:monospace;transition:.2s}
.math-bar button:hover{border-color:var(--gold);color:var(--gold-dark)}
.math-bar .sep{width:1px;background:rgba(180,150,100,.2);margin:0 2px}
.math-preview{margin-top:6px;padding:10px;border-radius:6px;border:1px solid var(--gold-border);background:rgba(250,247,240,.6);min-height:24px;display:none;font-size:13px;overflow-x:auto}
.math-preview.show{display:block}

/* lightbox */
.lightbox{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);align-items:center;justify-content:center;cursor:pointer}
.lightbox.show{display:flex}
.lightbox img{max-width:92%;max-height:92%;border-radius:8px;border:2px solid var(--gold-light)}

/* password overlay */
.pwd-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center}
.pwd-overlay.hidden{display:none}
.pwd-box{background:var(--card-bg);border:2px solid var(--gold);border-radius:12px;padding:24px 32px;text-align:center;box-shadow:var(--shadow-md)}
.pwd-box h4{color:var(--gold-dark);font-size:16px;margin-bottom:12px}
.pwd-box input{padding:10px 14px;border:1px solid var(--gold-border);border-radius:8px;font-size:14px;font-family:inherit;color:var(--text-pri);background:var(--ivory);width:200px;text-align:center}
.pwd-box .pwd-btns{margin-top:12px;display:flex;gap:10px;justify-content:center}
.pwd-box button{padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit}
.pwd-box .btn-ok{background:linear-gradient(135deg,#f5ead5,#ead9b0);color:var(--gold-dark);border:1px solid var(--gold);font-weight:600}
.pwd-box .btn-cancel{background:var(--ivory);color:var(--text-sec);border:1px solid var(--gold-border)}

/* toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:8px;background:var(--gold-dark);color:#fff;font-size:13px;z-index:300;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}

/* 进度条 */
.progress-bar{padding:10px 16px;border-top:1px solid var(--gold-border);background:rgba(250,247,240,.5)}
.progress-bar .prog-label{font-size:11px;color:var(--text-sec);display:flex;justify-content:space-between;margin-bottom:4px}
.progress-bar .prog-track{height:6px;background:var(--ivory-dark);border-radius:3px;overflow:hidden}
.progress-bar .prog-fill{height:100%;background:linear-gradient(90deg,var(--gold-light),var(--gold));border-radius:3px;transition:.5s}

/* ====== MOBILE ====== */
@media(max-width:768px){
  .sidebar{position:fixed;left:-100%;top:0;height:100vh;z-index:100;transition:left .3s;box-shadow:4px 0 20px rgba(0,0,0,.1)}
  .sidebar.open{left:0}
  .sidebar-close-btn{display:block}
  .menu-btn{display:flex}
  .overlay-mask.show{display:block}
  .float-decor{display:none}
  .header-banner{min-height:220px}
  .header-banner .header-inner{padding-top:100px}
  .header-banner h1{font-size:17px}
  .content{padding:16px 14px}
  .card-bd textarea{font-size:16px}
  .toolbar{padding:8px 12px}
  .toolbar h3{font-size:13px}
  .chapter-meta{padding:10px 12px;font-size:11px}
  .chapter-gallery img{height:90px}
}
@media(max-width:480px){
  .header-banner{min-height:160px;padding:0 12px 8px}
  .header-banner .header-inner{padding-top:70px}
  .header-banner h1{font-size:15px}
  .section-card{border-radius:8px}
  .toolbar button{padding:4px 8px;font-size:10px}
  .content{padding:12px 10px}
}
</style>
</head>
<body>

<!-- 背景图层 -->
<div class="bg-layer" id="bgLayer"></div>

<!-- 浮动角色装饰 -->
<div class="float-decor d1" id="floatDec1"></div>
<div class="float-decor d2" id="floatDec2"></div>

<!-- 页眉横幅 -->
<div class="header-banner" id="headerBanner">
  <div class="header-inner">
    <h1 id="headerTitle">初中数学 · 苏科版</h1>
    <div class="sub">32章体系 · 备课 · 讲题 · 作业设计</div>
  </div>
</div>

<div class="overlay-mask" id="overlayMask" onclick="closeSidebar()"></div>
<button class="menu-btn" onclick="openSidebar()"><span></span></button>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <button class="sidebar-close-btn" onclick="closeSidebar()">✕</button>
    <div class="sidebar-header">
      <h2>章节导航</h2>
      <div class="sub">苏科版 · 新教材</div>
    </div>
    <div class="sidebar-stats">
      <span>已填 <b id="stats-filled">0</b>/32章</span>
      <span>约 <b id="stats-words">0</b>千字</span>
    </div>
    <input class="search-box" id="searchBox" placeholder="搜索章节…" oninput="filterChapters()">
    <div class="nav" id="chapterNav"></div>
    <div class="progress-bar">
      <div class="prog-label"><span>备课进度</span><span id="progPct">0%</span></div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="toolbar">
      <h3 id="currentTitle">选择章节开始</h3>
      <span class="mode-tag view" id="modeBadge">只读</span>
      <button onclick="toggleEditMode()" id="btnEditToggle">开启编辑</button>
      <button onclick="saveData()" id="btnSave" style="display:none">保存</button>
      <button onclick="exportAll()">导出</button>
      <button onclick="importData()">导入</button>
      <button onclick="generatePublishHTML()" class="btn-gold">生成发布版</button>
    </div>
    <div class="content" id="mainContent">
      <div class="empty-state">
        <div class="emblem">✦</div>
        <h4>苏科版初中数学 · 32章</h4>
        <p>从左侧选择章节<br>支持知识要点、核心素养、易错清单、真题、笔记、作业</p>
      </div>
    </div>
  </div>
</div>

<!-- 密码验证 -->
<div class="pwd-overlay hidden" id="pwdOverlay">
  <div class="pwd-box">
    <h4>输入编辑密码</h4>
    <input type="password" id="pwdInput" onkeydown="if(event.key==='Enter')checkPwd()">
    <div class="pwd-btns"><button class="btn-ok" onclick="checkPwd()">确认</button><button class="btn-cancel" onclick="document.getElementById('pwdOverlay').classList.add('hidden')">取消</button></div>
  </div>
</div>

<!-- 灯箱 -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')"><img id="lightboxImg"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ========== 图片数据（base64内嵌） ========== -->
<script>
const IMG_DATA = {};

let totalChapters=32;

let isEditMode=false,currentChapter=null,chapterData={};

function loadData(){
  const s=localStorage.getItem('skb7_data');if(s){try{chapterData=JSON.parse(s)}catch{chapterData={}}}
  updateStats()}
function saveData(){localStorage.setItem('skb7_data',JSON.stringify(chapterData));updateStats();showToast('已保存')}
let at;function autoSave(){clearTimeout(at);at=setTimeout(()=>{localStorage.setItem('skb7_data',JSON.stringify(chapterData));updateStats()},600)}function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function updateStats(){
  let f=0,w=0;
  for(const d of Object.values(chapterData)){const t=[d.knowledge,d.competency,d.mistakes,d.kax,d.lessonPlan,d.homework].filter(Boolean).join('');if(t.length>10)f++;w+=t.length}
  document.getElementById('stats-filled').textContent=f;
  document.getElementById('stats-words').textContent=Math.round(w/1000);
  document.getElementById('progPct').textContent=Math.round(f/totalChapters*100)+'%';
  document.getElementById('progFill').style.width=Math.round(f/totalChapters*100)+'%';
}

function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlayMask').classList.add('show')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlayMask').classList.remove('show')}
function selAndClose(ch,item){selectChapter(ch,item);if(window.innerWidth<=768)closeSidebar()}

function toggleEditMode(){
  if(isEditMode){isEditMode=false;document.getElementById('modeBadge').className='mode-tag view';document.getElementById('modeBadge').textContent='只读';document.getElementById('btnEditToggle').textContent='开启编辑';document.getElementById('btnSave').style.display='none';if(currentChapter)renderContent(currentChapter)}
  else{document.getElementById('pwdOverlay').classList.remove('hidden');document.getElementById('pwdInput').value='';document.getElementById('pwdInput').focus()}}
function checkPwd(){if(document.getElementById('pwdInput').value===EP){isEditMode=true;document.getElementById('pwdOverlay').classList.add('hidden');document.getElementById('modeBadge').className='mode-tag edit';document.getElementById('modeBadge').textContent='编辑中';document.getElementById('btnEditToggle').textContent='退出编辑';document.getElementById('btnSave').style.display='';if(currentChapter)renderContent(currentChapter);showToast('编辑模式已开启')}else{showToast('密码错误')}}

function getGrade(id){if(id.startsWith('7a'))return'七上';if(id.startsWith('7b'))return'七下';if(id.startsWith('8a'))return'八上';if(id.startsWith('8b'))return'八下';return'九年级'}

// 设置背景图
function setGradeBg(grade){
  const gc=gColors[grade];
  const bgLayer=document.getElementById('bgLayer');
  if(IMG_DATA[gc.bgRole]){
    bgLayer.style.backgroundImage='url('+IMG_DATA[gc.bgRole]+')';
  }
}

// 设置页眉
function setHeader(){
  const hb=document.getElementById('headerBanner');
  if(IMG_DATA['header']){
    hb.style.backgroundImage='url('+IMG_DATA['header']+')';
  }
}

// 设置浮动装饰
function setFloatDecor(){
  const d1=document.getElementById('floatDec1');
  const d2=document.getElementById('floatDec2');
  if(IMG_DATA['float_1']) d1.innerHTML='<img src=\"'+IMG_DATA['float_1']+'\" alt="">';
  if(IMG_DATA['float_2']) d2.innerHTML='<img src=\"'+IMG_DATA['float_2']+'\" alt="">';
}

// 生成章节底部大图HTML
function footerImgHtml(chId){
  const role=CH_FOOTER_IMG[chId];
  if(!role||!IMG_DATA[role]) return '';
  return '<div class="chapter-footer-img"><img src=\"'+IMG_DATA[role]+'\" alt="" loading="lazy" onclick="openLb(this.src)"></div>';
}

function renderNav(){
  const nav=document.getElementById('chapterNav');nav.innerHTML='';
  for(const[grade,data]of Object.entries(textbook)){
    const gc=gColors[grade],g=document.createElement('div');g.className='grade-group';
    const t=document.createElement('div');t.className='grade-title g-'+gc.idx;t.innerHTML=grade+' <span class="gd-arrow open">▶</span>';
    t.onclick=()=>{const c=g.querySelector('.grade-chapters');c.classList.toggle('collapsed');t.querySelector('.gd-arrow').classList.toggle('open')};
    const cd=document.createElement('div');cd.className='grade-chapters';
    data.chapters.forEach(ch=>{
      const item=document.createElement('div');item.className='chapter-item '+gc.chCls;item.dataset.id=ch.id;item.dataset.grade=grade;item.dataset.name=ch.name;
      let filled=false;const d=chapterData[ch.id];if(d){const tx=Object.values(d).filter(Boolean).join('');if(tx.length>10)filled=true}
      const dotColor=elDots[ch.el]||'#c9a96e';
      item.innerHTML='<span class="el-dot" style="background:'+dotColor+'"></span><span class="ch-num">'+ch.num+'</span>'+ch.name+(filled?'<span class="badge" style="background:'+gc.acc+'">✦</span>':'');
      item.onclick=()=>selAndClose(ch,item);cd.appendChild(item)});
    g.appendChild(t);g.appendChild(cd);nav.appendChild(g)}}
function filterChapters(){const q=document.getElementById('searchBox').value.toLowerCase();document.querySelectorAll('.chapter-item').forEach(it=>{const n=(it.dataset.name||'').toLowerCase(),g=(it.dataset.grade||'').toLowerCase();it.style.display=(!q||n.includes(q)||g.includes(q))?'':'none'})}

function selectChapter(ch,item){
  currentChapter=ch;document.querySelectorAll('.chapter-item.active').forEach(el=>el.classList.remove('active'));item.classList.add('active');
  document.getElementById('currentTitle').textContent='第'+ch.num+'章 · '+ch.name;
  setGradeBg(getGrade(ch.id));
  if(!chapterData[ch.id])chapterData[ch.id]={knowledge:'',competency:'',mistakes:'',kax:'',lessonPlan:'',homework:'',images:[]};renderContent(ch)}

function renderContent(ch){
  const d=chapterData[ch.id],main=document.getElementById('mainContent'),ed=isEditMode,grade=getGrade(ch.id),gc=gColors[grade];
  const secs=[
    {f:'knowledge',icon:'📖',title:'知识要点',tag:'核心',ph:'本章核心知识点、公式、定理、性质……',st:true},
    {f:'competency',icon:'🎯',title:'核心素养与教学目标',tag:'课标',ph:'六大核心素养目标、教学重难点、教学方法……'},
    {f:'mistakes',icon:'⚠️',title:'易错清单',tag:'错因',ph:'学生常见错误类型、认知根源分析、干预策略……'},
    {f:'kax',icon:'📋',title:'KAX真题精选',tag:'真题',ph:'从KAX工具书中摘录典型真题，标注年份、地区、来源ID……'},
    {f:'lessonPlan',icon:'📝',title:'备课笔记',ph:'教案框架、课堂活动设计、提问链、板书设计、教学反思……'},
    {f:'homework',icon:'📄',title:'课后作业设计',ph:'分层作业：基础巩固层 / 能力提升层 / 拓展探究层……'}
  ];

  let html = '';

  // 章节信息栏（去掉考频文字）
  html += '<div class="chapter-meta"><div class="meta-item">教材：<b>苏科版 · '+grade+'</b></div><div class="meta-item">第 '+ch.num+' 章 · '+ch.name+'</div></div>';

  // 各内容卡片
  secs.forEach(s=>{
    const v=d[s.f]||'';
    html+='<div class="section-card"><div class="card-hd" onclick="this.nextElementSibling.classList.toggle(\'collapsed\');this.querySelector(\'.hd-toggle\').classList.toggle(\'collapsed\')"><span class="hd-icon">'+s.icon+'</span><span class="hd-title">'+s.title+'</span>'+(s.tag?'<span class="hd-tag '+gc.tc+'">'+s.tag+'</span>':'')+'<span class="hd-toggle">▼</span></div><div class="card-bd">';
    if(ed){
      html+='<textarea placeholder="'+s.ph+'" oninput="autoSaveCh(\''+ch.id+'\',\''+s.f+'\',this.value);updateMP(this,\'mp-'+s.f+'\')">'+v+'</textarea><div class="math-preview" id="mp-'+s.f+'"></div>';
      if(s.st&&ch.keywords)html+='<div class="tag-row">'+ch.keywords.map(k=>'<span class="kw" onclick="insTag(this,\''+s.f+'\',\''+ch.id+'\')">'+k+'</span>').join('')+'</div>'
    } else {
      html+='<div class="readonly-render">'+(v||'')+'</div>';
    }
    html+='</div></div>'});

  // 图片素材区
  const imgs=d.images||[];
  html+='<div class="section-card"><div class="card-hd" onclick="this.nextElementSibling.classList.toggle(\'collapsed\');this.querySelector(\'.hd-toggle\').classList.toggle(\'collapsed\')"><span class="hd-icon">🎼</span><span class="hd-title">图片素材</span><span class="hd-tag '+gc.tc+'">附件</span><span class="hd-toggle">▼</span></div><div class="card-bd">';
  if(ed)html+='<div class="upload-zone" onclick="this.querySelector(\'input\').click()"><div class="hint">点击上传图片（自动压缩存储）</div><input type="file" accept="image/*" onchange="uploadImg(\''+ch.id+'\',this)"></div>';
  if(imgs.length>0)html+='<div class="img-row">'+imgs.map(img=>'<img class="thumb" src="'+img+'" onclick="openLb(\''+img.replace(/'/g,"\\'")+'\')">').join('')+'</div>';
  html+='</div></div>';

  // 章节底部大图
  html += footerImgHtml(ch.id);

  if(ed){
    html+='<div class="section-card"><div class="card-hd" onclick="this.nextElementSibling.classList.toggle(\'collapsed\');this.querySelector(\'.hd-toggle\').classList.toggle(\'collapsed\')"><span class="hd-icon">∑</span><span class="hd-title">公式快速插入</span><span class="hd-tag '+gc.tc+'">LaTeX</span><span class="hd-toggle">▼</span></div><div class="card-bd"><div class="math-bar">'+
    mb('x²','$x^2$')+mb('√x','$\\sqrt{x}$')+mb('a/b','$\\frac{a}{b}$')+mb('±','$\\pm$')+
    mb('≠','$\\neq$')+mb('≤','$\\leq$')+mb('≥','$\\geq$')+mb('△','$\\triangle$')+
    mb('∠','$\\angle$')+mb('∥','$\\parallel$')+mb('⊥','$\\perp$')+
    mb('π','$\\pi$')+mb('°','$\\circ$')+
    '<span class="sep"></span>'+
    mb('y=kx+b','$y=kx+b$')+mb('二次函数','$y=ax^2+bx+c$')+mb('勾股','$a^2+b^2=c^2$')+
    mb('Δ','$\Delta=b^2-4ac$')+mb('求根','$x=\\frac{-b\\pm\\sqrt{b^2-4ac}}{2a}$')+
    '</div><div style="font-size:11px;color:var(--text-dim);margin-top:6px">点击按钮插入到任意编辑区 · 支持 <code style="color:'+gc.acc+'">$公式$</code> 语法</div></div></div>'
  }

  main.innerHTML=html;
  if(!ed)setTimeout(()=>{if(window.MathJax)MathJax.typesetPromise([main])},100)}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function mb(l,c){return'<button onclick="insLT(\''+(currentChapter?currentChapter.id:'')+'\',\''+(c||'')+'\')">'+l+'</button>'}

function autoSaveCh(id,f,v){if(!chapterData[id])chapterData[id]={};chapterData[id][f]=v;renderNav();autoSave()}
function updateMP(ta,pid){const pv=document.getElementById(pid);if(!pv)return;const v=ta.value,hm=v.includes('$');if(!hm){pv.classList.remove('show');pv.innerHTML='';return}pv.classList.add('show');pv.innerHTML='<span style="color:var(--text-dim);font-size:11px">公式预览：</span>'+v;if(window.MathJax)MathJax.typesetPromise([pv])}
function insTag(tag,f,id){const ta=document.querySelector('textarea[oninput*="'+f+'"]');if(!ta)return;const s=ta.selectionStart,e=ta.selectionEnd;ta.value=ta.value.substring(0,s)+tag.textContent+ta.value.substring(e);ta.selectionStart=ta.selectionEnd=s+tag.textContent.length;autoSaveCh(id,f,ta.value);ta.focus()}
function insLT(id,code){const ta=document.querySelector('#mainContent textarea');if(!ta)return;const s=ta.selectionStart,e=ta.selectionEnd,ma=ta.getAttribute('oninput').match(/'(\w+)'/);if(!ma)return;const f=ma[1];ta.value=ta.value.substring(0,s)+code+ta.value.substring(e);ta.selectionStart=ta.selectionEnd=s+code.length;autoSaveCh(id,f,ta.value);ta.focus();updateMP(ta,'mp-'+f)}

function uploadImg(id,input){const f=input.files[0];if(!f)return;if(f.size>2*1024*1024){showToast('图片不超过2MB');return}const r=new FileReader();r.onload=function(e){if(!chapterData[id])chapterData[id]={};if(!chapterData[id].images)chapterData[id].images=[];chapterData[id].images.push(e.target.result);autoSave();renderContent(currentChapter);showToast('已上传')};r.readAsDataURL(f);input.value=''}
function openLb(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('show')}

function exportAll(){
  let lines=['# 初中数学备课笔记','','> '+new Date().toLocaleString(),'','---',''];
  for(const[g,data]of Object.entries(textbook)){
    lines.push('## '+g);lines.push('');
    data.chapters.forEach(ch=>{
      const d=chapterData[ch.id];if(!d)return;
      const t=[d.knowledge,d.competency,d.mistakes,d.kax,d.lessonPlan,d.homework].filter(Boolean).join('');
      if(t.length<5)return;
      lines.push('### 第'+ch.num+'章 · '+ch.name);
      if(d.knowledge){lines.push('');lines.push('**知识要点**');lines.push('');lines.push(d.knowledge)}
      if(d.competency){lines.push('');lines.push('**核心素养**');lines.push('');lines.push(d.competency)}
      if(d.mistakes){lines.push('');lines.push('**易错清单**');lines.push('');lines.push(d.mistakes)}
      if(d.kax){lines.push('');lines.push('**KAX真题**');lines.push('');lines.push(d.kax)}
      if(d.lessonPlan){lines.push('');lines.push('**备课笔记**');lines.push('');lines.push(d.lessonPlan)}
      if(d.homework){lines.push('');lines.push('**课后作业**');lines.push('');lines.push(d.homework)}
      lines.push('');lines.push('---');lines.push('')
    })
  }
  dl(lines.join('\n'),'备课笔记_'+new Date().toISOString().slice(0,10)+'.md','text/markdown');
  dl(JSON.stringify(chapterData,null,2),'备课数据_'+new Date().toISOString().slice(0,10)+'.json','application/json');
  showToast('导出完成')
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    try{
      const j=JSON.parse(await f.text());
      if(j.data&&j.comments){if(confirm('导入'+Object.keys(j.data).length+'章数据，覆盖现有？')){chapterData=j.data;saveData();renderNav();if(currentChapter)renderContent(currentChapter);showToast('导入完成')}}
      else{if(confirm('导入'+Object.keys(j).length+'章数据，覆盖现有？')){chapterData=j;saveData();renderNav();if(currentChapter)renderContent(currentChapter);showToast('导入完成')}}
    }catch{showToast('文件格式错误')}
  };inp.click()
}
function generatePublishHTML(){
  const dj=JSON.stringify(chapterData);
  const src=document.documentElement.outerHTML;
  const pub=src.replace('let chapterData={}','let chapterData='+JSON.stringify(chapterData))
    .replace(/localStorage\.getItem\('skb7_data'\);[^}]+}/g,'null;');
  dl(pub,'发布版_'+new Date().toISOString().slice(0,10)+'.html','text/html');
  dl(dj,'备课数据_'+new Date().toISOString().slice(0,10)+'.json','application/json');
  showToast('发布版已生成')
}
function dl(c,fn,m){const b=new Blob([c],{type:m+';charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn;a.click()}
